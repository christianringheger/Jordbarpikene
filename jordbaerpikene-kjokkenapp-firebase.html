<!doctype html><html lang="no"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Jordbærpikene · Kjøkkenapp</title>
<meta name="theme-color" content="#f5f5ea">
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Jordbærpikene">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;600;700;800;900&family=Hanken+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
--bg:#f5f5ea;--panel:#fff;--ink:#1d1813;--muted:#897b68;--faint:#b6a98f;
--line:#e7e1d0;--coral:#da2a1c;--coral-deep:#b51f14;--camel:#cda177;
--safe:#5f7a63;--safe-bg:#eaf0ea;--block:#b51f14;--block-bg:#f7e6e3;--green:#708573;
--signal:"Archivo","Arial Narrow",system-ui,sans-serif;
--body:"Hanken Grotesk",system-ui,-apple-system,"Segoe UI",Roboto,Arial,sans-serif;
--r:14px}
*{box-sizing:border-box}
html,body{margin:0}
body{background:var(--bg);color:var(--ink);font-size:16px;line-height:1.5;
font-family:var(--body);-webkit-font-smoothing:antialiased}
.nun{font-family:var(--signal),system-ui,sans-serif}
.wrap{max-width:840px;margin:0 auto;padding:0 18px}
button{font-family:inherit;cursor:pointer}

/* TOPP */
.top{position:sticky;top:0;z-index:30;background:rgba(251,246,239,.9);backdrop-filter:blur(10px);border-bottom:1px solid var(--line)}
.top .wrap{display:flex;align-items:center;gap:14px;padding:12px 18px}
.brand{font-family:var(--signal);font-weight:900;font-size:18px;white-space:nowrap}
.brand .a{color:var(--coral)}
.search{flex:1;position:relative;min-width:0}
.search svg{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--faint)}
#q{width:100%;border:1px solid var(--line);background:#fff;border-radius:11px;padding:11px 12px 11px 38px;font-size:15px;color:var(--ink)}
#q:focus{outline:none;border-color:var(--camel);box-shadow:0 0 0 3px rgba(215,167,127,.25)}
.arkiv{color:var(--muted);text-decoration:none;font-weight:700;font-size:13px;white-space:nowrap;padding:8px 10px;border-radius:9px}
.arkiv:hover{background:#fff;color:var(--ink)}

/* FILTER */
.filters{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin:18px 0 6px}
.seg{display:inline-flex;background:#fff;border:1px solid var(--line);border-radius:11px;overflow:hidden}
.seg button{border:0;background:transparent;padding:8px 15px;font-size:13.5px;font-weight:800;color:var(--muted)}
.seg button[aria-pressed="true"]{background:var(--ink);color:#fff}
.alltoggle{margin-left:auto;border:1px solid var(--line);background:#fff;border-radius:11px;padding:8px 14px;font-size:13.5px;font-weight:800;color:var(--ink);display:inline-flex;align-items:center;gap:8px}
.alltoggle[aria-pressed="true"]{background:var(--coral);color:#fff;border-color:var(--coral)}
.alrow{display:flex;gap:7px;flex-wrap:wrap;margin:12px 0 2px}
.alrow .al{border:1px solid var(--line);background:#fff;color:var(--ink);border-radius:999px;padding:7px 13px;font-size:13.5px;font-weight:800}
.alrow .al[aria-pressed="true"]{background:var(--block);border-color:var(--block);color:#fff}

/* LISTE */
.sec{font-family:var(--signal);font-weight:900;font-size:12.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--faint);margin:26px 0 8px;padding-left:2px}
.list{background:#fff;border:1px solid var(--line);border-radius:var(--r);overflow:hidden}
.row{display:flex;align-items:center;gap:14px;width:100%;border:0;background:#fff;text-align:left;padding:15px 16px;border-bottom:1px solid var(--line)}
.row:last-child{border-bottom:0}
.row:hover{background:#FFFBF5}
.kind{font-size:10px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;color:var(--faint);width:62px;flex:none}
.rname{font-family:var(--signal);font-weight:800;font-size:15.5px;flex:1;min-width:0}
.rname .sub{display:block;font-family:system-ui;font-weight:500;font-size:12.5px;color:var(--muted);margin-top:1px}
.right{font-family:var(--signal);font-weight:900;font-size:14.5px;color:var(--ink);white-space:nowrap}
.right.muted{color:var(--muted);font-weight:700;font-size:12.5px}
.stat{font-size:11px;font-weight:800;padding:3px 9px;border-radius:999px;white-space:nowrap}
.stat.s{background:var(--safe-bg);color:var(--safe)}.stat.b{background:var(--block-bg);color:var(--block)}
.arrow{color:var(--faint);flex:none}
.empty{padding:48px 20px;text-align:center;color:var(--muted)}
footer{margin:30px 0 60px;text-align:center;color:var(--faint);font-size:12px}

/* MODAL */
.scrim{position:fixed;inset:0;background:rgba(51,36,28,.45);backdrop-filter:blur(2px);z-index:50;display:none}
.scrim.open{display:block}
.sheet{position:fixed;z-index:51;background:var(--bg);display:none;flex-direction:column}
.sheet.open{display:flex}
@media(min-width:680px){.sheet{top:5vh;left:50%;transform:translateX(-50%);width:620px;max-height:90vh;border-radius:18px;overflow:hidden;box-shadow:0 30px 80px -20px rgba(51,36,28,.5)}}
@media(max-width:679px){.sheet{inset:0}}
.shead{display:flex;align-items:center;gap:10px;padding:14px 16px;background:#fff;border-bottom:1px solid var(--line)}
.shead .ico{border:0;background:#F3ECE1;width:36px;height:36px;border-radius:10px;display:grid;place-items:center;color:var(--ink)}
.shead .ttl{flex:1;min-width:0}
.shead .ttl .k{font-size:10.5px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;color:var(--faint)}
.shead .ttl .n{font-family:var(--signal);font-weight:900;font-size:18px;line-height:1.15}
.sbody{overflow:auto;-webkit-overflow-scrolling:touch;padding:18px 18px 40px}
.metaline{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:6px}
.tag{font-size:12px;font-weight:800;color:var(--muted);background:#fff;border:1px solid var(--line);border-radius:999px;padding:4px 11px}
.tag.price{color:var(--coral-deep)}.tag.ny{background:var(--coral);color:#fff;border-color:var(--coral)}.tag.best{background:#2E6B45;color:#fff;border-color:#2E6B45}

.blocktitle{font-family:var(--signal);font-weight:900;font-size:13px;letter-spacing:.05em;text-transform:uppercase;color:var(--faint);margin:22px 0 10px}
.comp{display:flex;align-items:center;gap:10px;padding:11px 13px;background:#fff;border:1px solid var(--line);border-radius:11px;margin-bottom:7px;width:100%;text-align:left}
.comp.link:hover{border-color:var(--camel);background:#FFFBF5}
.comp .cn{flex:1;font-weight:700;font-size:14.5px}
.comp .go{font-size:12px;font-weight:800;color:var(--coral);display:inline-flex;align-items:center;gap:4px}
.comp .aller{font-size:11px;color:var(--faint);font-weight:700}
.comp.plain{cursor:default}

.scaler{background:#fff;border:1px solid var(--line);border-radius:12px;padding:11px 13px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:14px}
.scaler .lab{font-weight:800;font-size:13px;color:var(--muted)}
.qbtn{border:1px solid var(--line);background:#fff;border-radius:9px;padding:6px 11px;font-weight:800;font-size:13px;color:var(--ink)}
.qbtn[aria-pressed="true"]{background:var(--coral);color:#fff;border-color:var(--coral)}
.stepper{display:inline-flex;align-items:center;border:1px solid var(--line);border-radius:9px;overflow:hidden}
.stepper button{border:0;background:#fff;width:30px;height:34px;font-size:17px;font-weight:800;color:var(--coral)}
.stepper input{width:46px;border:0;text-align:center;font-weight:800;color:var(--ink)}
.vidph{display:flex;align-items:center;gap:13px;border:2px dashed var(--camel);border-radius:13px;padding:15px 17px;margin:2px 0 14px;background:repeating-linear-gradient(135deg,#fff,#fff 10px,#FFFBF5 10px,#FFFBF5 20px);color:var(--coral)}
.vidph div{display:flex;flex-direction:column}.vidph b{color:var(--ink);font-size:14.5px;font-family:var(--signal)}.vidph span{font-size:12.5px;color:var(--faint);font-weight:700}
.vidwrap{position:relative;padding-bottom:56.25%;height:0;border-radius:13px;overflow:hidden;margin:2px 0 14px;border:1px solid var(--line)}
.vidwrap iframe{position:absolute;inset:0;width:100%;height:100%;border:0}
.steps.check{list-style:none;padding:0;counter-reset:none}
.steps.check li{display:flex;gap:12px;align-items:flex-start;padding:11px 0;border-bottom:1px solid var(--line);cursor:pointer}
.steps.check li:last-child{border-bottom:0}
.steps.check .cb{flex:none;width:23px;height:23px;border:2px solid var(--camel);border-radius:7px;display:grid;place-items:center;color:#fff;margin-top:1px;transition:.12s}
.steps.check li.done .cb{background:var(--safe);border-color:var(--safe)}
.steps.check li.done .tx{color:var(--faint);text-decoration:line-through}
.steps.check .cb svg{opacity:0}.steps.check li.done .cb svg{opacity:1}
.ckreset{margin:2px 0 0;border:1px solid var(--line);background:#fff;border-radius:9px;padding:6px 12px;font-size:12.5px;font-weight:800;color:var(--muted)}
.gfcard{background:var(--safe-bg);border:1px solid #CFE6D7;border-radius:13px;padding:13px 15px;margin:14px 0 0}
.gfcard .gfhd{display:flex;align-items:center;gap:8px;font-family:var(--signal);font-weight:900;font-size:14.5px;color:var(--safe)}
.gfcard p{margin:7px 0 9px;font-size:13.5px;color:#2f6b46;line-height:1.45}
.gflink{border:1px solid var(--safe);background:#fff;color:var(--safe);border-radius:9px;padding:7px 12px;font-weight:800;font-size:13px}
.gtitle{font-family:var(--signal);font-weight:900;font-size:18px;margin:2px 0 4px}
.glist{display:flex;flex-direction:column;gap:9px;margin-top:12px}
.glist .gi{display:flex;gap:11px;align-items:flex-start;background:#fff;border:1px solid var(--line);border-radius:11px;padding:11px 13px;font-size:14px}
.glist .gi svg{flex:none;color:var(--safe);margin-top:2px}
.hdbtn{border:1px solid var(--line);background:#fff;border-radius:11px;padding:8px 12px;font-weight:800;font-size:13px;color:var(--safe);display:inline-flex;align-items:center;gap:7px;margin-right:10px}
.hdbtn:hover{border-color:var(--safe)}
.yieldout{margin-left:auto;font-weight:800;color:var(--safe);font-size:13px}
.itab{width:100%;border-collapse:collapse}
.itab td{padding:9px 0;border-bottom:1px dashed var(--line);font-size:14.5px;vertical-align:top}
.itab td.a{text-align:right;font-family:var(--signal);font-weight:900;color:var(--coral-deep);white-space:nowrap;width:1%;padding-right:14px}
.itab .igrp{font-family:var(--signal);font-weight:900;font-size:11px;letter-spacing:.05em;text-transform:uppercase;color:var(--camel);padding-top:14px!important}
.itab .ln{color:var(--coral);font-weight:800;font-size:12px;display:inline-flex;align-items:center;gap:3px;margin-left:8px;cursor:pointer}
.steps{list-style:none;counter-reset:s;margin:8px 0 0;padding:0}
.steps li{position:relative;padding:9px 0 9px 32px;border-bottom:1px dashed var(--line);font-size:14.5px}
.steps li:last-child{border:0}
.steps li::before{counter-increment:s;content:counter(s);position:absolute;left:0;top:8px;width:22px;height:22px;background:var(--ink);color:#fff;border-radius:50%;display:grid;place-items:center;font-family:var(--signal);font-weight:900;font-size:11px}
.hold{margin-top:14px;font-size:13px;color:var(--muted)}
.hold b{color:var(--ink)}
.note{margin:18px 0 0;font-size:12px;color:var(--faint);text-align:center}
.pdflink{display:inline-flex;align-items:center;gap:7px;margin:2px 0 4px;padding:8px 13px;border:1px solid var(--line);
border-radius:10px;background:#fff;color:var(--ink);text-decoration:none;font-weight:800;font-size:13px}
.pdflink:hover{border-color:var(--camel);background:#FFFBF5}
.pdflink svg{color:var(--coral)}
.presbox{background:#FFF7E8;border:1px solid #EFDFBB;border-radius:11px;padding:11px 13px;margin:16px 0 0;font-size:13.5px;color:#7a5d2a}
.presbox b{color:#5e4716;display:block;font-size:11px;letter-spacing:.05em;text-transform:uppercase;margin-bottom:3px}
.layers{display:flex;flex-direction:column;gap:3px;background:#fff;border:1px solid var(--line);border-radius:11px;padding:10px 13px}
.layers span{font-size:13px;font-weight:600;padding:4px 0;border-bottom:1px dashed var(--line)}
.layers span:last-child{border:0}
.layers span:first-child{color:var(--coral-deep);font-weight:800}
.tiles{display:grid;grid-template-columns:repeat(2,1fr);gap:13px;margin-top:6px}
@media(min-width:580px){.tiles{grid-template-columns:repeat(4,1fr)}}
.tile{position:relative;text-align:left;border:1px solid var(--line);background:#fff;border-radius:17px;padding:18px 16px 16px;display:flex;flex-direction:column;gap:11px;min-height:128px;cursor:pointer;transition:.13s}
.tile:hover{border-color:var(--camel);transform:translateY(-2px);box-shadow:0 12px 26px -16px rgba(51,36,28,.4)}
.tile .ic{width:40px;height:40px;border-radius:12px;display:grid;place-items:center;color:#fff}
.tile .tt{font-family:var(--signal);font-weight:900;font-size:16px;line-height:1.12}
.tile .ts{font-size:12px;color:var(--muted);font-weight:600;line-height:1.3}
.tile .cnt{position:absolute;top:15px;right:16px;font-family:var(--signal);font-weight:900;font-size:13px;color:var(--faint)}
.homeback{border:1px solid var(--line);background:#fff;border-radius:10px;padding:8px 13px;font-weight:800;font-size:13.5px;color:var(--ink);margin-bottom:6px;display:inline-flex;align-items:center;gap:6px}
.homeback:hover{border-color:var(--camel)}
.vhead{font-family:var(--signal);font-weight:900;font-size:23px;margin:10px 0 6px}
.pfrow{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:6px}
.pfilter{border:1px solid var(--line);background:#fff;border-radius:999px;padding:7px 13px;font-weight:800;font-size:13px;color:var(--muted);cursor:pointer}
.pfilter.on{background:var(--ink);color:#fff;border-color:var(--ink)}
.pcat{font-family:var(--signal);font-weight:900;font-size:11px;letter-spacing:.05em;text-transform:uppercase;color:var(--camel);margin:18px 0 2px}
.preprow{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid var(--line);flex-wrap:wrap}
.pinfo{flex:1;min-width:150px;cursor:pointer}.pinfo b{font-family:var(--signal);font-weight:800;font-size:14.5px;display:block}
.pinfo span{font-size:12px;color:var(--faint);font-weight:700}
.pdays{display:flex;gap:4px}
.pday{width:29px;height:31px;border:1px solid var(--line);background:#fff;border-radius:8px;font-weight:800;font-size:12px;color:var(--muted);cursor:pointer}
.pday.on{background:var(--coral);color:#fff;border-color:var(--coral)}
.lead{font-size:13.5px;color:var(--muted);margin:2px 0 16px;line-height:1.5}
.ptabs{display:inline-flex;background:#fff;border:1px solid var(--line);border-radius:11px;overflow:hidden;margin-bottom:14px}
.ptabs button{border:0;background:transparent;padding:8px 16px;font-weight:800;font-size:13.5px;color:var(--muted);cursor:pointer}
.ptabs button.on{background:var(--ink);color:#fff}
.pmeta{font-size:12px;color:var(--faint);font-weight:700;display:flex;gap:12px;flex-wrap:wrap;margin-top:3px}
.pmeta .yld{color:var(--safe)}
.weekwrap{display:flex;flex-direction:column;gap:11px}
.daycard{border:1px solid var(--line);background:#fff;border-radius:13px;padding:13px 15px}
.daycard .dhd{font-family:var(--signal);font-weight:900;font-size:15px;margin-bottom:9px;display:flex;justify-content:space-between;align-items:baseline}
.daycard .dhd span{color:var(--faint);font-size:12px;font-weight:700}
.pchip{display:inline-flex;align-items:center;gap:7px;background:#FFF7EE;border:1px solid var(--line);border-radius:10px;padding:7px 11px;margin:0 6px 6px 0;font-size:13px;font-weight:700;cursor:pointer}
.pchip .y{color:var(--safe);font-weight:800;font-size:12px}
.dempty{color:var(--faint);font-size:13px}
.salescard{border:2px dashed var(--camel);border-radius:13px;padding:13px 15px;margin-bottom:14px;background:repeating-linear-gradient(135deg,#fff,#fff 10px,#FFFBF5 10px,#FFFBF5 20px)}
.salescard b{font-family:var(--signal);font-size:14px}.salescard p{margin:5px 0 0;font-size:12.5px;color:var(--muted)}
.fbcard{border:1px solid var(--line);background:#fff;border-radius:15px;padding:17px 18px;margin:20px 0 8px}
.fbcard h3{font-family:var(--signal);font-weight:900;font-size:16px;margin:0 0 4px}
.fbcard p{margin:0 0 10px;font-size:13px;color:var(--muted)}
.fbcard textarea{width:100%;border:1px solid var(--line);border-radius:11px;padding:11px;font:inherit;font-size:14px;resize:vertical;min-height:74px;background:#fff;color:var(--ink)}
.fbsend{margin-top:10px;border:0;background:var(--coral);color:#fff;border-radius:11px;padding:10px 18px;font-weight:800;font-size:14px;cursor:pointer}
.fbsend:hover{background:var(--coral-deep)}.fbok{margin-left:12px;color:var(--safe);font-weight:800;font-size:13px}
.rvfilter{width:100%;border:1px solid var(--line);border-radius:11px;padding:10px 13px;font-size:14px;margin-bottom:14px;background:#fff;color:var(--ink)}
.rvrow{padding:12px 0;border-bottom:1px solid var(--line)}
.rvname{font-family:var(--signal);font-weight:800;font-size:14.5px;display:flex;align-items:center;gap:8px}
.rvname .c{color:var(--faint);font-size:12px;font-weight:700}
.rvuses{display:flex;flex-wrap:wrap;gap:6px;margin-top:7px}
.rvuse{background:#fff;border:1px solid var(--line);border-radius:8px;padding:5px 9px;font-size:12px;font-weight:700;cursor:pointer;color:var(--ink)}
.rvuse.rec{color:var(--safe)}
.stationhd{display:flex;align-items:center;gap:10px;font-family:var(--signal);font-weight:900;font-size:13px;letter-spacing:.05em;text-transform:uppercase;color:#fff;background:var(--ink);border-radius:10px;padding:9px 14px;margin:20px 0 4px}
.stationhd.disk{background:#9C6B3F}.stationhd small{font-weight:700;opacity:.75;text-transform:none;letter-spacing:0;font-size:11px}
.imgph{display:flex;align-items:center;gap:13px;border:2px dashed var(--camel);border-radius:13px;padding:15px 17px;margin:2px 0 14px;background:repeating-linear-gradient(135deg,#fff,#fff 10px,#FFFBF5 10px,#FFFBF5 20px);color:var(--coral)}
.imgph div{display:flex;flex-direction:column}.imgph b{color:var(--ink);font-size:14.5px;font-family:var(--signal)}.imgph span{font-size:12.5px;color:var(--faint);font-weight:700}
.dishimg{width:100%;border-radius:13px;margin:2px 0 14px;border:1px solid var(--line);display:block}
.hrow{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid var(--line)}
.hinfo{flex:1;font-family:var(--signal);font-weight:800;font-size:14.5px;cursor:pointer}
.hq{display:inline-flex;align-items:center;border:1px solid var(--line);border-radius:9px;overflow:hidden}
.hq button{border:0;background:#fff;width:30px;height:32px;font-size:16px;font-weight:800;color:var(--coral);cursor:pointer}
.hq b{min-width:30px;text-align:center;font-family:var(--signal)}
.hrm{border:1px solid var(--line);background:#fff;border-radius:8px;width:32px;height:32px;color:var(--muted);font-weight:800;cursor:pointer;margin-left:6px}
.haddrow{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px dashed var(--line)}
.haddrow button{border:1px solid var(--coral);background:#fff;color:var(--coral);border-radius:9px;padding:6px 13px;font-weight:800;font-size:13px;cursor:pointer}
.wprog{display:flex;align-items:center;gap:10px;margin-bottom:12px;font-weight:800;font-size:13.5px;color:var(--muted)}
.wbar{flex:1;height:9px;background:var(--line);border-radius:99px;overflow:hidden}.wbar i{display:block;height:100%;background:var(--safe);border-radius:99px}
.wchip{display:flex;align-items:center;gap:9px;background:#FFF7EE;border:1px solid var(--line);border-radius:10px;padding:9px 11px;margin:0 0 7px;font-size:13.5px;font-weight:700;cursor:pointer;width:100%;text-align:left}
.wchip .cb{flex:none;width:21px;height:21px;border:2px solid var(--camel);border-radius:6px;display:grid;place-items:center;color:#fff}
.wchip.done .cb{background:var(--safe);border-color:var(--safe)}.wchip.done .cb svg{opacity:1}.wchip .cb svg{opacity:0}

#seg{display:none}
@media(prefers-reduced-motion:reduce){*{transition:none!important}}

/* ===== Firebase-lag: innlogging, admin, editor ===== */
#fbLogin{position:fixed;inset:0;z-index:200;background:var(--bg);display:flex;align-items:center;justify-content:center;padding:24px}
body.authed #fbLogin{display:none}
.fbcard2{width:100%;max-width:360px;background:#fff;border:1px solid var(--line);border-radius:18px;padding:28px 24px;box-shadow:0 24px 60px -28px rgba(51,36,28,.45)}
.fblogo{font-family:var(--signal);font-weight:900;font-size:26px;text-align:center;letter-spacing:-.01em}
.fblogo .a{color:var(--coral)}
.fbsub{text-align:center;color:var(--muted);font-weight:700;font-size:12.5px;letter-spacing:.04em;text-transform:uppercase;margin:2px 0 20px}
#fbLogin input{width:100%;border:1px solid var(--line);background:#fff;border-radius:11px;padding:12px 13px;font-size:15px;color:var(--ink);margin-bottom:11px}
#fbLogin input:focus{outline:none;border-color:var(--camel);box-shadow:0 0 0 3px rgba(215,167,127,.25)}
#fbLoginBtn{width:100%;border:0;background:var(--coral);color:#fff;border-radius:11px;padding:13px;font-weight:800;font-size:15px;cursor:pointer}
#fbLoginBtn:hover{background:var(--coral-deep)}
.fberr{color:var(--block);font-size:13px;font-weight:700;margin-top:10px;text-align:center;min-height:18px}
.fbhint{color:var(--faint);font-size:11.5px;text-align:center;margin-top:14px;line-height:1.5}

/* admin-stripe nederst */
#adminBar{display:none;position:fixed;left:0;right:0;bottom:0;z-index:120;align-items:center;gap:9px;flex-wrap:wrap;
  background:var(--ink);color:#fff;padding:9px 14px;font-size:13px;font-weight:700}
body.authed #adminBar{display:flex}
#adminBar .abname{font-weight:800;opacity:.85;margin-right:auto;font-size:12.5px}
#adminBar button{border:0;border-radius:9px;padding:7px 13px;font-weight:800;font-size:12.5px;cursor:pointer;background:#5a4636;color:#fff}
#adminBar button:hover{background:#6d573f}
#adminBar #abEdit.on{background:var(--coral)}
#abEdit,#abSeed{display:none}
body.is-admin #abEdit,body.is-admin #abSeed{display:inline-flex}
#abStatus{font-size:12px;font-weight:800;color:var(--camel)}
body.authed main{padding-bottom:70px}

/* blyant-knapp i detalj-headeren */
#adminEditBtn{display:none;border:0;background:var(--coral);width:36px;height:36px;border-radius:10px;place-items:center;color:#fff}
body.edit-on .sheet.open #adminEditBtn{display:grid}
#adminEditBtn:hover{background:var(--coral-deep)}

/* editor-overlay (ligger over detalj-arket) */
#edScrim{position:fixed;inset:0;background:rgba(51,36,28,.5);backdrop-filter:blur(2px);z-index:60;display:none}
#edScrim.open{display:block}
#edPanel{position:fixed;z-index:61;background:var(--bg);display:none;flex-direction:column}
#edPanel.open{display:flex}
@media(min-width:680px){#edPanel{top:4vh;left:50%;transform:translateX(-50%);width:640px;max-height:92vh;border-radius:18px;overflow:hidden;box-shadow:0 30px 80px -20px rgba(51,36,28,.5)}}
@media(max-width:679px){#edPanel{inset:0}}
.edhead{display:flex;align-items:center;gap:10px;padding:14px 16px;background:#fff;border-bottom:1px solid var(--line)}
.edhead .edttl{flex:1;font-family:var(--signal);font-weight:900;font-size:17px}
.edhead button{border:0;background:#F3ECE1;width:34px;height:34px;border-radius:9px;font-size:17px;font-weight:800;color:var(--ink);cursor:pointer}
.edbody{overflow:auto;-webkit-overflow-scrolling:touch;padding:18px 18px 40px}
.edlab{font-family:var(--signal);font-weight:900;font-size:11.5px;letter-spacing:.05em;text-transform:uppercase;color:var(--faint);margin:18px 0 7px}
.edbody input[type=text],.edbody input[type=number],.edbody input[type=url],.edbody textarea,.edbody select{
  width:100%;border:1px solid var(--line);border-radius:11px;padding:11px 12px;font:inherit;font-size:14.5px;color:var(--ink);background:#fff}
.edbody textarea{resize:vertical;min-height:90px;line-height:1.5}
.edrow{display:flex;gap:10px;flex-wrap:wrap}
.edrow>div{flex:1;min-width:120px}
.edcheck{display:flex;align-items:center;gap:9px;font-weight:700;font-size:14px;margin-top:6px}
.edimg{display:flex;gap:13px;align-items:center;flex-wrap:wrap}
#edImgPrev{width:120px;height:80px;object-fit:cover;border-radius:11px;border:1px solid var(--line);display:none}
.edupload{border:1px solid var(--coral);background:#fff;color:var(--coral);border-radius:10px;padding:9px 14px;font-weight:800;font-size:13px;cursor:pointer;display:inline-flex;align-items:center;gap:7px}
.edupload:hover{background:#FFFBF5}
#edImgProg{font-size:12.5px;font-weight:800;color:var(--safe)}
.edsave{margin-top:22px;width:100%;border:0;background:var(--coral);color:#fff;border-radius:12px;padding:14px;font-weight:800;font-size:15px;cursor:pointer}
.edsave:hover{background:var(--coral-deep)}
.eddetails{margin-top:22px;border-top:1px solid var(--line);padding-top:16px}
.eddetails summary{font-weight:800;font-size:13px;color:var(--muted);cursor:pointer}
.edraw{margin-top:12px;font-family:ui-monospace,Menlo,Consolas,monospace;font-size:12.5px;min-height:220px}
.edrawbtn{margin-top:10px;border:1px solid var(--ink);background:#fff;color:var(--ink);border-radius:10px;padding:9px 14px;font-weight:800;font-size:13px;cursor:pointer}
.edhelp{font-size:12px;color:var(--faint);margin-top:6px;line-height:1.45}
</style>
<style id="jpbrand">
/* ===== JP-profil: typografi-rolle, fliser, merkevareelementer ===== */
body{letter-spacing:.005em}
.brand{font-family:var(--signal);font-weight:800;letter-spacing:.01em;font-size:19px;display:inline-flex;align-items:center}
.brand .a{color:var(--coral)}
.brand .berry{display:inline-flex;width:15px;color:var(--coral);margin-right:6px}
.brand .berry svg{width:15px;height:auto;display:block}
.brand{display:inline-flex;align-items:center}
.brand svg{width:150px;height:auto;display:block}
.top .wrap{padding:10px 18px}

/* Signal-rolle = caps + sperret tracking på display-tekst */
.vhead{text-transform:uppercase;letter-spacing:.045em;font-weight:900}
.tile .tt{text-transform:uppercase;letter-spacing:.04em;font-size:14.5px;font-weight:800}
.gtitle{text-transform:uppercase;letter-spacing:.04em}
.shead .ttl .n{text-transform:uppercase;letter-spacing:.025em;font-size:16px;line-height:1.18;font-weight:900}
.sec{letter-spacing:.13em}
.blocktitle{letter-spacing:.08em}
.right,.tag.price,.stat,.tag{font-family:var(--signal)}
.tag.price{letter-spacing:.02em}

/* fliser: ryddigere ikonbrikke + jevn rytme */
.tiles{gap:12px}
.tile{border:1px solid var(--line);border-radius:16px;min-height:122px;background:#fff}
.tile:hover{border-color:var(--camel);box-shadow:0 14px 28px -18px rgba(29,24,19,.45)}
.tile .ic{width:42px;height:42px;border-radius:12px;box-shadow:0 5px 12px -6px rgba(29,24,19,.5)}
.tile .ic svg{width:22px;height:22px}
.tile .cnt{font-family:var(--signal);font-weight:800;color:var(--faint)}

/* topp: tydeligere merkevareflate */
.top{background:rgba(245,245,234,.92)}
.alltoggle[aria-pressed="true"],.seg button[aria-pressed="true"]{box-shadow:none}

/* innlogging: primærlogo på grønn flate (profil-godkjent kontrastbunn) */
.fbcard2{padding:22px}
.fblogo{background:var(--green);border-radius:14px;padding:24px 22px;display:flex;justify-content:center;margin-bottom:16px}
.fblogo svg{width:122px;height:auto;display:block}
.fbsub{margin:0 0 18px}

/* admin-stripe i merkevarefarge */
#adminBar{background:var(--ink)}
#adminBar #abEdit.on{background:var(--coral)}
</style>
<style id="responsive">
/* ===== Mobil + iPad (portrett/landskap) ===== */
html{-webkit-text-size-adjust:100%;text-size-adjust:100%}      /* hindrer at tekst blåses opp ved rotasjon */
*{-webkit-tap-highlight-color:transparent}

/* trygge soner: notch / hjemindikator, særlig viktig i landskap */
.top .wrap{padding-left:max(18px,env(safe-area-inset-left));padding-right:max(18px,env(safe-area-inset-right))}
.wrap{padding-left:max(18px,env(safe-area-inset-left));padding-right:max(18px,env(safe-area-inset-right))}
#adminBar{padding-left:max(14px,env(safe-area-inset-left));padding-right:max(14px,env(safe-area-inset-right));padding-bottom:max(9px,env(safe-area-inset-bottom))}
body.authed main{padding-bottom:calc(74px + env(safe-area-inset-bottom))}

/* kolonnetrapp: telefon 2 · iPad portrett 3 · iPad landskap/desktop 4 */
.tiles{grid-template-columns:repeat(2,1fr)}
@media(min-width:600px){.tiles{grid-template-columns:repeat(3,1fr)}}
@media(min-width:900px){.tiles{grid-template-columns:repeat(4,1fr)}}

/* bruk bredden på store skjermer (iPad landskap/desktop) */
@media(min-width:1024px){.wrap{max-width:1040px}}
@media(min-width:1280px){.wrap{max-width:1120px}}

/* detalj + editor litt romsligere på store skjermer */
@media(min-width:1024px){.sheet{width:700px}#edPanel{width:720px}}

/* fullskjerm detalj/editor på telefon: pust nederst for hjemindikator */
@media(max-width:679px){
  .sbody{padding-bottom:calc(40px + env(safe-area-inset-bottom))}
  .edbody{padding-bottom:calc(40px + env(safe-area-inset-bottom))}
  /* unngå at iOS zoomer inn ved fokus i felt (<16px utløser zoom) */
  input,select,textarea{font-size:16px}
}

/* toppstripe på smale telefoner: logo+knapper øverst, søk på egen rad */
@media(max-width:560px){
  .top .wrap{flex-wrap:wrap;row-gap:10px}
  .brand svg{width:124px}
  .search{order:3;flex-basis:100%}
}
</style>
<style id="stepfix">
/* korrekt nummerering av fremgangsmåte-trinn (1, 2, 3 …) */
.steps.check{counter-reset:s}
.steps.check li::before{
  counter-increment:s;content:counter(s);
  position:static;flex:none;margin-top:1px;
  width:25px;height:25px;border-radius:50%;
  background:var(--ink);color:#fff;
  display:grid;place-items:center;
  font-family:var(--signal);font-weight:800;font-size:12.5px;line-height:1;
}
.steps.check li.done::before{background:var(--safe)}
.steps.check .cb{display:none}
</style>
<style id="mediafix">
/* mindre, trykkbart bilde */
.imgthumb{position:relative;display:block;width:100%;padding:0;border:1px solid var(--line);border-radius:13px;overflow:hidden;margin:2px 0 12px;background:#fff;cursor:zoom-in}
.imgthumb img{display:block;width:100%;height:178px;object-fit:cover}
@media(min-width:680px){.imgthumb img{height:208px}}
.imgzoom{position:absolute;right:9px;bottom:9px;width:30px;height:30px;border-radius:9px;background:rgba(29,24,19,.6);color:#fff;display:grid;place-items:center}
.imgzoom svg{width:15px;height:15px}
.imgthumb img{cursor:zoom-in}
.imgplay{position:absolute;left:10px;top:10px;width:40px;height:40px;border-radius:50%;border:0;background:var(--coral);color:#fff;display:grid;place-items:center;cursor:pointer;box-shadow:0 6px 16px -4px rgba(0,0,0,.55)}
.imgplay:hover{background:var(--coral-deep)}
.imgplay svg{width:17px;height:17px;margin-left:2px}

/* lite video-ikon (kun når video finnes) */
.vidrow{margin:2px 0 6px}
.vidbtn{display:inline-flex;align-items:center;gap:9px;border:1px solid var(--line);background:#fff;color:var(--ink);border-radius:11px;padding:7px 15px 7px 7px;font-family:var(--signal);font-weight:800;font-size:13.5px;letter-spacing:.02em;cursor:pointer}
.vidbtn:hover{border-color:var(--coral);color:var(--coral)}
.vidbtn .vplay{flex:none;display:grid;place-items:center;width:28px;height:28px;border-radius:50%;background:var(--coral);color:#fff}
.vidbtn .vplay svg{width:14px;height:14px;margin-left:1px}

/* lightbox: video + bilde, over nedtonet bakgrunn */
body.lb-open{overflow:hidden}
.lb{position:fixed;inset:0;z-index:130;display:none;align-items:center;justify-content:center;padding:20px;background:rgba(18,14,10,.84);-webkit-backdrop-filter:blur(6px);backdrop-filter:blur(6px)}
.lb.open{display:flex}
.lbclose{position:absolute;top:max(14px,env(safe-area-inset-top));right:max(16px,env(safe-area-inset-right));width:46px;height:46px;border-radius:13px;border:0;background:rgba(255,255,255,.16);color:#fff;font-size:20px;cursor:pointer;display:grid;place-items:center;z-index:2}
.lbclose:hover{background:rgba(255,255,255,.3)}
.lbvid{width:min(96vw,1100px);aspect-ratio:16/9;max-height:84vh;border-radius:14px;overflow:hidden;background:#000;box-shadow:0 30px 90px -20px rgba(0,0,0,.7)}
.lbvid iframe{width:100%;height:100%;border:0;display:block}
#imgFull{max-width:96vw;max-height:88vh;border-radius:14px;box-shadow:0 30px 90px -20px rgba(0,0,0,.7)}
</style>

    let h=`<div class="daycard"><div class="dhd">${DN[day]}<span>${its.length} prep</span></div>`;
    if(its.length){h+=its.map(r=>{const key=r.id+"|"+day;const isd=!!dk[key];if(isd)done++;const lk=piLink(r);
      return `<button class="wchip ${isd?'done':''}" data-wk="${key}"><span class="cb"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.5"><path d="M20 6 9 17l-5-5"/></svg></span><span class="wt">${r.name}</span>${r.hold?`<span class="y">${r.hold}</span>`:""}</button>`;}).join("");}
    else h+=`<div class="dempty">Ingenting planlagt – legg til i Liste.</div>`;
    cards.push(h+`</div>`);
  }
  const prog=total?Math.round(done/total*100):0;
  let html=`<div class="salescard"><b>💡 Forslag fra salgstall — kommer</b><p>Når salgsdata kobles på, foreslår appen hvor mye som bør preppes hvilke dager.</p></div>`;
  html+=`<div class="wprog">Uke ${weekKey().split("-W")[1]} · ${done}/${total} ferdig<div class="wbar"><i style="width:${prog}%"></i></div></div>`;
  return html+`<div class="weekwrap">`+cards.join("")+`</div>`;
}
function planBody(){
  return `<p class="lead">Den faktiske prepplista (Forberedelse bong · Produksjon · Ta ut · Baking). Planlegg hvilke ukedager hver oppgave gjøres. Hak av dagene i <b>Liste</b>. I <b>Denne uka</b> krysser du av hver prep etter hvert som den er gjort (nullstilles ved ukeskifte). Holdbarhet/oppbevaring og antall vises på hver. Lagres lokalt i nettleseren.</p>`+planTabs()+(planView==="uke"?weekCal():prepList());
}
function paint(){
  if(!stack.length)return close();
  show();
  const {kind,id}=stack[stack.length-1];
  document.getElementById("sback").hidden=stack.length<2;
  const body=document.getElementById("sbody");
  if(kind==="guide"){
    document.getElementById("sk").textContent="Veiledning";
    document.getElementById("sn").textContent="Glutenfritt";
    body.innerHTML=`<div class="gtitle">Trygg mat for alle</div>
      <p class="note" style="margin-top:0">Selv små mengder gluten kan gi alvorlige reaksjoner. Følg disse rutinene nøye ved oppbevaring, tilberedning og servering av glutenfri mat.</p>
      <div class="blocktitle">Rutiner for håndtering</div>
      <div class="glist">${GF_GUIDE.map(g=>`<div class="gi"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M20 6 9 17l-5-5"/></svg><span>${g}</span></div>`).join("")}</div>

  if(kind==="prep"){

    document.getElementById("sn").textContent="Preppeliste";

    document.getElementById("sbody").scrollTop=0;return;
  }
  if(kind==="dish"){
    const d=dById[id];
    document.getElementById("sk").textContent="Rett · "+(DCAT[d.cat]||"");
    document.getElementById("sn").textContent=d.name;
    const tags=[d.price?`<span class="tag price">${d.price},-</span>`:"",
      d.tag==="ny"?'<span class="tag ny">Ny</span>':d.tag==="bestselger"?'<span class="tag best">Bestselger</span>':"",
      d.gf?'<span class="tag">Kan lages glutenfri</span>':""].join("");
    const al=d.all.length?`<div class="blocktitle">Allergener</div><div class="metaline">${d.all.map(a=>`<span class="tag ${sel.has(a)?'best':''}">${AL[a]}</span>`).join("")}</div>`:"";
    const comps=d.comp.map(c=>{
      if(c.rid){const r=rById[c.rid];
        return `<button class="comp link" data-open="recipe:${c.rid}"><span class="cn">${c.n}</span><span class="aller">${c.a.map(a=>AL[a]).join(", ")}</span><span class="go">Oppskrift <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6"><path d="M9 6l6 6-6 6"/></svg></span></button>`;}
      return `<div class="comp plain"><span class="cn">${c.n}</span><span class="aller">${c.a.map(a=>AL[a]).join(", ")}</span></div>`;
    }).join("");
    const hasIng=d.build&&d.build.ing.length, hasSteps=d.build&&d.build.steps.length;
    let buildHTML="";
    if(hasIng){
      const scal=SCALABLE.includes(d.cat);
      const isCat=d.cat==="catering"||d.cat==="cateringpakke";
      const df=dfactors[id]??(isCat?10:1);
      const bings=d.build.ing.map(i=>{
        const ln=i.rid?`<span class="ln" data-open="recipe:${i.rid}">se prep<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M9 6l6 6-6 6"/></svg></span>`:"";
        const cell=scal?`<td class="a" data-damt>${fmt(i.amt*df,i.unit)}</td>`:`<td class="a">${i.amt%1?String(i.amt).replace(".",","):i.amt} ${i.unit}</td>`;
        return `<tr>${cell}<td>${i.name}${ln}</td></tr>`;}).join("");
      const bsteps=d.build.steps.map(x=>`<li>${x}</li>`).join("");
      const pres=d.build.pres?`<div class="presbox"><b>Servering</b> ${d.build.pres}</div>`:"";
      const layers=(d.build.layers&&d.build.layers.length)?`<div class="blocktitle">Lagdeling</div><div class="layers">${d.build.layers.map(x=>`<span>${x}</span>`).join("")}</div>`:"";
      const scaler=scal?`<div class="scaler"><span class="lab">Antall ${isCat?"personer":"kopper"}</span>
        <span class="stepper"><button data-dstep="-1">–</button><input type="number" min="1" step="1" value="${df}" data-dfin><button data-dstep="1">+</button></span></div>`:"";
      const blab=scal?(isCat?`Mengde · for ${df} ${df===1?"person":"personer"}`:`Oppskrift · per kopp`):"Slik lager du den · per porsjon";
      buildHTML=`${scaler}<div class="blocktitle" data-blab>${blab}</div>
        <table class="itab"><tbody>${bings}</tbody></table>
        ${d.build.steps.length?checkSteps(d.build.steps):""}${pres}${layers}`;
    } else if(hasSteps){
      buildHTML=`<div class="blocktitle">${d.cat==="cateringpakke"?"Slik gjør du":"Slik lager du den"}</div>${checkSteps(d.build.steps)}`;
    }
    let prepExtra="";
    if(hasIng){
      const have=new Set(d.build.ing.filter(i=>i.rid).map(i=>i.rid));
      const rids=[];
      d.comp.forEach(c=>{if(c.rid&&!have.has(c.rid)&&!rids.includes(c.rid))rids.push(c.rid);});
      if(d.ownprep&&!have.has(d.ownprep)&&!rids.includes(d.ownprep))rids.unshift(d.ownprep);
      if(rids.length){
        prepExtra=`<div class="blocktitle">Tilhørende prep</div>`+rids.map(rid=>{const r=rById[rid];
          return `<button class="comp link" data-open="recipe:${rid}"><span class="cn">${r?r.title:rid}</span><span class="go">Oppskrift <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6"><path d="M9 6l6 6-6 6"/></svg></span></button>`;}).join("");
      }
    }
    let compHTML="";
    if(!hasIng&&d.comp.length){
      const label=d.cat==="cateringpakke"?"Innhold":"Satt sammen av";
      const anyLink=d.comp.some(c=>c.rid);
      compHTML=`<div class="blocktitle">${label}</div>${comps}`+(anyLink?`<p class="note">Komponenter med «Oppskrift» er koblet – trykk for å gå rett til preppen.</p>`:"");
    }
    body.innerHTML=`<div class="metaline">${tags}</div>
      ${srcLink(d.src)}
      ${mediaBlock(d,true)}
      ${buildHTML}
      ${prepExtra}
      ${compHTML}
      ${al}
      ${gfCard(d)}`;
    if(hasIng&&SCALABLE.includes(d.cat)){
      const isCat=d.cat==="catering"||d.cat==="cateringpakke";
      const base=isCat?10:1;
      const refD=()=>{const ff=dfactors[id]??base;
        body.querySelectorAll("[data-damt]").forEach((td,k)=>td.textContent=fmt(d.build.ing[k].amt*ff,d.build.ing[k].unit));
        const lab=body.querySelector("[data-blab]");if(lab&&isCat)lab.textContent="Mengde · for "+ff+" "+(ff===1?"person":"personer");};
      body.querySelectorAll("[data-dstep]").forEach(b=>b.onclick=()=>{dfactors[id]=Math.max(1,(dfactors[id]??base)+(+b.dataset.dstep));
        body.querySelector("[data-dfin]").value=dfactors[id];refD();});
      body.querySelector("[data-dfin]").oninput=e=>{const v=parseInt(e.target.value);if(v>0){dfactors[id]=v;refD();}};
    }
  } else {
    const r=rById[id];const f=factors[id]??1;
    document.getElementById("sk").textContent="Oppskrift · "+(RCAT[r.cat]||"");
    document.getElementById("sn").textContent=r.title;
    const quick=[0.5,1,2,4].map(q=>`<button class="qbtn" data-q="${q}" aria-pressed="${f===q}">×${q}</button>`).join("");
    const yo=r.yield?`<span class="yieldout">≈ ${Math.round(parseFloat(r.yield)*f)} ${r.yieldunit||"porsj"}</span>`:"";
    let lastGrp=null;
    const ings=r.ing.map(i=>{
      let head="";
      if(i.grp&&i.grp!==lastGrp){lastGrp=i.grp;head=`<tr><td></td><td class="igrp">${i.grp}</td></tr>`;}
      const ln=i.rid?`<span class="ln" data-open="recipe:${i.rid}">se prep<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M9 6l6 6-6 6"/></svg></span>`:"";
      return head+`<tr><td class="a" data-amt>${fmt(i.amt*f,i.unit)}</td><td>${i.name}${ln}</td></tr>`;}).join("");
    const steps=r.steps.map(s=>`<li>${s}</li>`).join("");
    const used=r.usedBy.length?`<div class="blocktitle">Brukes i</div>${r.usedBy.map(([id,nm])=>`<button class="comp link" data-open="dish:${id}"><span class="cn">${nm}</span><span class="go">Rett <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6"><path d="M9 6l6 6-6 6"/></svg></span></button>`).join("")}`:"";
    body.innerHTML=`
      <div class="scaler"><span class="lab">Skaler</span>${quick}
        <span class="stepper"><button data-step="-1">–</button><input type="number" min="0.25" step="0.25" value="${f}" data-fin><button data-step="1">+</button></span>${yo}</div>
      ${srcLink(r.src)}
      ${mediaBlock(r,false)}
      <div class="blocktitle">Ingredienser</div><table class="itab"><tbody>${ings}</tbody></table>
      <div class="blocktitle">Slik gjør du</div>${checkSteps(r.steps)}
      ${r.hold?`<div class="hold">🕓 Holdbarhet: <b>${r.hold}</b></div>`:""}
      ${used}`;
    // scaler-bindinger
    const ref=()=>{const ff=factors[id]??1;
      body.querySelectorAll("[data-amt]").forEach((td,k)=>td.textContent=fmt(r.ing[k].amt*ff,r.ing[k].unit));
      const y=body.querySelector(".yieldout");if(y&&r.yield)y.textContent="≈ "+Math.round(parseFloat(r.yield)*ff)+" "+(r.yieldunit||"porsj");
      body.querySelectorAll(".qbtn").forEach(b=>b.setAttribute("aria-pressed",parseFloat(b.dataset.q)===(factors[id]??1)));};
    body.querySelectorAll(".qbtn").forEach(b=>b.onclick=()=>{factors[id]=parseFloat(b.dataset.q);ref();});
    body.querySelectorAll("[data-step]").forEach(b=>b.onclick=()=>{factors[id]=Math.max(0.25,(factors[id]??1)+(+b.dataset.step)*0.25);
      body.querySelector("[data-fin]").value=factors[id];ref();});
    body.querySelector("[data-fin]").oninput=e=>{const v=parseFloat(e.target.value);if(v>0){factors[id]=v;ref();}};
  }
  body.scrollTop=0;
}

<script>
/* =================================================================
   JORDBÆRPIKENE KJØKKENAPP · Firebase-lag
   Fyll inn de to blokkene under, deploy firestore.rules + storage.rules,
   opprett brukere i Firebase-konsollet, og trykk "Importer grunndata" én gang.
   ================================================================= */

/* 1) Firebase-konfig — Firebase console -> Prosjektinnstillinger -> "Dine apper" (web) */
const firebaseConfig = {
  apiKey: "DIN_API_KEY",
  authDomain: "DITT-PROSJEKT.firebaseapp.com",
  projectId: "DITT-PROSJEKT",
  storageBucket: "DITT-PROSJEKT.firebasestorage.app", /* nyere prosjekt; eldre kan ende på .appspot.com */
  messagingSenderId: "0000000000",
  appId: "1:0000000000:web:xxxxxxxxxxxx"
};

/* 2) Admin-e-poster (kan redigere + laste opp). MÅ også settes i firestore.rules og storage.rules. */
const ADMIN_EMAILS = ["din-admin@epost.no"];

/* === MIDLERTIDIG TESTINNLOGGING (bypasser Firebase) =========================
   Lar deg teste appen FØR Firebase er satt opp. Logg inn med TEST_USER/TEST_PASS.
   Laster innebygd grunndata lokalt; lagring/opplasting skjer kun i nettleseren.
   VIKTIG: sett TEST_BYPASS = false (eller slett blokken) FØR publisering –
   dette omgår all innlogging og er ikke sikkert. */
const TEST_BYPASS = true;
const TEST_USER = "test@jbp.no";
const TEST_PASS = "test1234";
/* ========================================================================== */

/* ---------- init ---------- */
firebase.initializeApp(firebaseConfig);
const fbAuth = firebase.auth();
const fbDb = firebase.firestore();
const fbStore = firebase.storage();
const COLS = ["dishes","recipes","prepitems"];
let currentUser=null, isAdmin=false, adminEdit=false, edCtx=null, testMode=false;
const $ = id => document.getElementById(id);
function setStatus(m){ const e=$("abStatus"); if(e)e.textContent=m||""; }

/* ---------- auth ---------- */
function mapErr(e){
  const c=(e&&e.code)||"";
  if(c.includes("invalid-credential")||c.includes("wrong-password")||c.includes("user-not-found")) return "Feil e-post eller passord.";
  if(c.includes("invalid-email")) return "Ugyldig e-postadresse.";
  if(c.includes("too-many-requests")) return "For mange forsøk – prøv igjen senere.";
  if(c.includes("network")) return "Nettverksfeil – sjekk tilkoblingen.";
  return (e&&e.message)||"Innlogging feilet.";
}
function enterTestMode(){
  testMode = true;
  currentUser = { email: TEST_USER };
  isAdmin = true;
  document.body.classList.add("authed","is-admin","test-mode");
  const an=document.querySelector("#adminBar .abname");
  if(an) an.innerHTML = '<span style="color:#ffd1cb">\u25CF TESTMODUS</span> \u00B7 '+TEST_USER+' \u00B7 admin';
  DB = {
    dishes:    SEED.dishes.map((x,i)=>Object.assign({}, x, {_ord:i})),
    recipes:   SEED.recipes.map((x,i)=>Object.assign({}, x, {_ord:i})),
    prepitems: SEED.prepitems.map((x,i)=>Object.assign({}, x, {_ord:i}))
  };
  rebuildIndex();
  render();
}
$("fbLoginBtn").onclick = () => {
  $("fbErr").textContent="";
  const em = $("fbEmail").value.trim().toLowerCase();
  const pw = $("fbPass").value;
  if(TEST_BYPASS && em===TEST_USER.toLowerCase() && pw===TEST_PASS){ enterTestMode(); return; }
  fbAuth.signInWithEmailAndPassword($("fbEmail").value.trim(), $("fbPass").value)
    .catch(e=>{ $("fbErr").textContent = mapErr(e); });
};
$("fbPass").addEventListener("keydown", e=>{ if(e.key==="Enter") $("fbLoginBtn").click(); });
$("abOut").onclick = () => { if(testMode){ location.reload(); return; } fbAuth.signOut(); };

fbAuth.onAuthStateChanged(u => {
  currentUser = u;
  if(u){
    isAdmin = ADMIN_EMAILS.map(x=>x.toLowerCase()).includes((u.email||"").toLowerCase());
    document.body.classList.add("authed");
    document.body.classList.toggle("is-admin", isAdmin);
    const an=document.querySelector("#adminBar .abname");
    if(an) an.textContent = (u.email||"") + (isAdmin?" · admin":"");
    loadData();
  } else {
    isAdmin=false; adminEdit=false;
    document.body.classList.remove("authed","is-admin","edit-on");
  }
});

/* ---------- datalasting ---------- */
async function loadData(){
  setStatus("Laster …");
  const out={};
  for(const col of COLS){
    try{
      const snap = await fbDb.collection(col).get();
      if(snap.empty){ out[col] = SEED[col].map((x,i)=>Object.assign({}, x, {_ord:i})); }
      else { out[col] = snap.docs.map(d=>d.data()).sort((a,b)=>((a._ord??0)-(b._ord??0))); }
    }catch(e){
      console.error("loadData", col, e);
      out[col] = SEED[col].map((x,i)=>Object.assign({}, x, {_ord:i}));
    }
  }
  DB = { dishes: out.dishes, recipes: out.recipes, prepitems: out.prepitems };
  rebuildIndex();
  render();
  setStatus("");
}

/* ---------- engangs-import av grunndata ---------- */
$("abSeed").onclick = async () => {
  if(!isAdmin) return;
  if(!confirm("Importere all grunndata til Firestore?\nDokumenter med samme id blir overskrevet.")) return;
  setStatus("Importerer …");
  try{
    for(const col of COLS){
      const items = SEED[col];
      for(let i=0;i<items.length;i+=400){
        const batch = fbDb.batch();
        items.slice(i,i+400).forEach((x,j)=>{
          const data = Object.assign({}, x, {_ord: i+j});
          batch.set(fbDb.collection(col).doc(String(x.id)), data);
        });
        await batch.commit();
      }
    }
    setStatus("Import fullført ✓");
    await loadData();
  }catch(e){ alert("Import feilet: "+e.message); setStatus(""); }
};

  document.body.classList.toggle("edit-on", adminEdit);
  $("abEdit").textContent = adminEdit ? "Vis som bruker" : "Redigeringsmodus";
  $("abEdit").classList.toggle("on", adminEdit);

/* ---------- blyant i detalj-headeren ---------- */
$("adminEditBtn").onclick = () => {
  if(!stack.length) return;
  const t = stack[stack.length-1];
  if(t.kind==="dish"||t.kind==="recipe") openEditor(t.kind, t.id);
  else alert("Denne kan ikke redigeres her ennå (kun retter og oppskrifter i v1).");
};

/* ---------- editor ---------- */
function getItem(kind,id){ return kind==="dish"?dById[id]:rById[id]; }
function splitLines(v){ return (v||"").split(/\n+/).map(s=>s.trim()).filter(Boolean); }
function esc(s){ return (s==null?"":String(s)).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
function normVideo(v){
  v=(v||"").trim(); if(!v) return "";
  let m;
  if((m=v.match(/youtube\.com\/watch\?v=([\w-]+)/))) return "https://www.youtube.com/embed/"+m[1];
  if((m=v.match(/youtu\.be\/([\w-]+)/))) return "https://www.youtube.com/embed/"+m[1];
  if((m=v.match(/vimeo\.com\/(\d+)/))) return "https://player.vimeo.com/video/"+m[1];
  return v; /* anta at det allerede er en embed-URL */
}
function openEditor(kind,id){
  const col = kind==="dish"?"dishes":"recipes";
  const item = getItem(kind,id);
  if(!item) return;
  edCtx = { kind, id, col, item, pendingImage: item.image||"" };
  $("edTtl").textContent = (kind==="dish"?"Rediger rett":"Rediger oppskrift");
  const name = kind==="dish"? item.name : item.title;
  let html = "";
  /* bilde */
  html += '<div class="edlab">Bilde av ferdig rett</div>';
  html += '<div class="edimg"><img id="edImgPrev" alt="">';
  html += '<label class="edupload"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M12 5v14M5 12h14"/></svg>Last opp bilde<input id="edImgFile" type="file" accept="image/*" hidden></label>';
  html += '<button class="edupload" id="edImgClear" type="button" style="border-color:var(--line);color:var(--muted)">Fjern</button>';
  html += '<span id="edImgProg"></span></div>';
  /* video */
  html += '<div class="edlab">Instruksjonsvideo</div>';
  html += '<input id="edVideo" type="url" placeholder="YouTube-/Vimeo-lenke" value="'+esc(item.video||"")+'">';
  html += '<div class="edhelp">Lim inn en vanlig YouTube- eller Vimeo-lenke – den konverteres automatisk til innebygd avspilling.</div>';
  /* navn */
  html += '<div class="edlab">Navn</div><input id="edName" type="text" value="'+esc(name)+'">';
  if(kind==="dish"){
    html += '<div class="edrow"><div><div class="edlab">Pris (kr)</div><input id="edPrice" type="number" value="'+(item.price==null?"":item.price)+'"></div>';
    html += '<div><div class="edlab">Merkelapp</div><select id="edTag"><option value="">Ingen</option>'
          + '<option value="ny"'+(item.tag==="ny"?" selected":"")+'>Ny</option>'
          + '<option value="bestselger"'+(item.tag==="bestselger"?" selected":"")+'>Bestselger</option></select></div></div>';
    html += '<label class="edcheck"><input id="edGf" type="checkbox"'+(item.gf?" checked":"")+'> Kan lages glutenfri</label>';
    if(item.build){
      html += '<div class="edlab">Servering</div><textarea id="edPres" style="min-height:64px">'+esc(item.build.pres||"")+'</textarea>';
      html += '<div class="edlab">Fremgangsmåte (ett steg per linje)</div><textarea id="edSteps">'+esc((item.build.steps||[]).join("\n"))+'</textarea>';
    } else {
      html += '<div class="edhelp">Denne retten har ingen fremgangsmåte-blokk. Bruk «Avansert: rediger rå JSON» for å legge til.</div>';
    }
  } else {
    html += '<div class="edlab">Holdbarhet</div><input id="edHold" type="text" value="'+esc(item.hold||"")+'">';
    html += '<div class="edlab">Fremgangsmåte (ett steg per linje)</div><textarea id="edSteps">'+esc((item.steps||[]).join("\n"))+'</textarea>';
  }
  html += '<button class="edsave" id="edSave">Lagre endringer</button>';
  /* avansert rå JSON */
  html += '<details class="eddetails"><summary>Avansert: rediger rå JSON (full kontroll)</summary>';
  html += '<div class="edhelp">Overskriver hele dokumentet. Behold feltet «id». Endrer du allergener, komponenter, ingredienser e.l. gjøres det her i v1.</div>';
  html += '<textarea class="edraw" id="edRaw">'+esc(JSON.stringify(item,null,2))+'</textarea>';
  html += '<button class="edrawbtn" id="edRawSave">Lagre rå JSON</button></details>';
  $("edBody").innerHTML = html;

  if(edCtx.pendingImage){ const pv=$("edImgPrev"); pv.src=edCtx.pendingImage; pv.style.display="block"; }
  $("edImgFile").addEventListener("change", e=>onPickImage(e.target.files[0]));
  $("edImgClear").onclick = ()=>{ edCtx.pendingImage=""; const pv=$("edImgPrev"); pv.style.display="none"; $("edImgProg").textContent="Fjernet"; };
  $("edSave").onclick = saveFriendly;
  $("edRawSave").onclick = saveRaw;
  $("edScrim").classList.add("open"); $("edPanel").classList.add("open");
  $("edBody").scrollTop=0;
}
function closeEditor(){ $("edScrim").classList.remove("open"); $("edPanel").classList.remove("open"); edCtx=null; }
$("edClose").onclick = closeEditor;
$("edScrim").onclick = closeEditor;

function onPickImage(file){
  if(!file || !edCtx) return;
  if(testMode){
    const r=new FileReader();
    r.onload=()=>{ edCtx.pendingImage=r.result; const pv=$("edImgPrev"); pv.src=r.result; pv.style.display="block"; const p=$("edImgProg"); if(p)p.textContent="Lagt inn lokalt \u2713"; };
    r.readAsDataURL(file);
    return;
  }
  const { col, id } = edCtx;
  const safe = file.name.replace(/[^\w.\-]/g,"_");
  const ref = fbStore.ref("media/"+col+"/"+id+"/"+Date.now()+"_"+safe);
  const task = ref.put(file);
  const prog = $("edImgProg");
  task.on("state_changed",
    s => { if(prog) prog.textContent = Math.round(s.bytesTransferred/s.totalBytes*100)+" %"; },
    e => { alert("Opplasting feilet: "+e.message); if(prog) prog.textContent=""; },
    async () => {
      const url = await ref.getDownloadURL();
      edCtx.pendingImage = url;
      const pv=$("edImgPrev"); pv.src=url; pv.style.display="block";
      if(prog) prog.textContent = "Lastet opp ✓";
    }
  );
}

async function persist(col,id,item){
  if(testMode){
    rebuildIndex(); render(); if(stack.length) paint(); closeEditor();
    setStatus("Lagret lokalt (testmodus \u2013 ikke sendt til server)");
    return;
  }
  setStatus("Lagrer …");
  try{
    await fbDb.collection(col).doc(String(id)).set(item);
    rebuildIndex();
    render();
    if(stack.length) paint();
    closeEditor();
    setStatus("Lagret ✓");
  }catch(e){ alert("Kunne ikke lagre: "+e.message); setStatus(""); }
}

function saveFriendly(){
  if(!edCtx) return;
  const { kind, id, col, item } = edCtx;
  if(kind==="dish"){
    item.name = ($("edName").value.trim()) || item.name;
    const p = $("edPrice").value.trim(); item.price = (p===""?null:Number(p));
    item.tag = $("edTag").value || null;
    item.gf = $("edGf").checked;
    if(item.build){
      item.build.pres = $("edPres").value;
      item.build.steps = splitLines($("edSteps").value);
    }
  } else {
    item.title = ($("edName").value.trim()) || item.title;
    item.hold = $("edHold").value.trim() || null;
    item.steps = splitLines($("edSteps").value);
  }
  const img = edCtx.pendingImage;
  if(img) item.image = img; else delete item.image;
  const vid = normVideo($("edVideo").value);
  if(vid) item.video = vid; else delete item.video;
  persist(col, id, item);
}

function saveRaw(){
  if(!edCtx) return;
  const { col, id } = edCtx;
  let obj;
  try{ obj = JSON.parse($("edRaw").value); }
  catch(e){ alert("Ugyldig JSON: "+e.message); return; }
  if(!obj.id) obj.id = id;
  if(edCtx.item._ord!=null && obj._ord==null) obj._ord = edCtx.item._ord;
  const arr = col==="dishes"?DB.dishes:DB.recipes;
  const ix = arr.findIndex(x=>x.id===id);
  if(ix>=0) arr[ix]=obj; else arr.push(obj);
  persist(col, obj.id, obj);
}
</script>

<script>
(function(){
  var $=function(id){return document.getElementById(id);};
  function openVideo(url){ if(!url)return; var sep=url.indexOf('?')>-1?'&':'?'; $('vidFrame').src=url+sep+'autoplay=1&rel=0'; $('vidLightbox').classList.add('open'); document.body.classList.add('lb-open'); }
  function closeVideo(){ $('vidFrame').src=''; $('vidLightbox').classList.remove('open'); document.body.classList.remove('lb-open'); }
  function openImg(url){ if(!url)return; $('imgFull').src=url; $('imgLightbox').classList.add('open'); document.body.classList.add('lb-open'); }
  function closeImg(){ $('imgLightbox').classList.remove('open'); $('imgFull').src=''; document.body.classList.remove('lb-open'); }
  document.addEventListener('click', function(e){
    var v=e.target.closest('[data-vidplay]'); if(v){ openVideo(v.getAttribute('data-vidplay')); return; }
    var i=e.target.closest('[data-imgview]'); if(i){ openImg(i.getAttribute('data-imgview')); return; }
  });
  $('vidClose').onclick=closeVideo; $('imgClose').onclick=closeImg;
  $('vidLightbox').addEventListener('click', function(e){ if(e.target.id==='vidLightbox') closeVideo(); });
  $('imgLightbox').addEventListener('click', function(e){ if(e.target.id==='imgLightbox') closeImg(); });
  document.addEventListener('keydown', function(e){ if(e.key==='Escape'){ closeVideo(); closeImg(); } });
})();
</script>
