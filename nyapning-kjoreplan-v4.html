<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nyåpninger – Bitastad</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&display=swap');
:root{--red:#da2a1c;--cream:#f5f5ea;--black:#000;--green:#708573;--gl:#e8e8dc;--gm:#c8c8bc;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--cream);font-family:'DM Sans',sans-serif;color:var(--black);}
.hdr{background:var(--red);padding:22px 40px;display:flex;align-items:center;justify-content:space-between;gap:16px;}
.hdr-left{flex:1;}
.hdr-eye{font-size:10px;font-weight:500;letter-spacing:.18em;text-transform:uppercase;color:rgba(255,255,255,.6);margin-bottom:4px;}
.hdr-title{font-size:24px;font-weight:500;color:#fff;}
.hdr-sub{font-size:13px;color:rgba(255,255,255,.7);margin-top:4px;}
.berry{width:48px;opacity:.9;flex-shrink:0;}
.back-btn{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);color:#fff;border-radius:6px;padding:7px 14px;font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer;display:flex;align-items:center;gap:6px;}
.back-btn:hover{background:rgba(255,255,255,.25);}
.ftr{background:var(--green);padding:16px 40px;display:flex;align-items:center;justify-content:space-between;}
.ftr-text{font-size:12px;color:rgba(255,255,255,.75);}
.ftr-brand{font-size:12px;font-weight:500;color:#fff;}
#view-dashboard{display:block;}
#view-detail{display:none;}
.dash-toolbar{background:#fff;border-bottom:1px solid var(--gl);padding:16px 40px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
.dash-summary{font-size:13px;color:#666;}
.new-btn{background:var(--red);color:#fff;border:none;border-radius:6px;padding:9px 18px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;display:flex;align-items:center;gap:7px;margin-left:auto;}
.new-btn:hover{opacity:.88;}
.dash-grid{padding:28px 40px 60px;display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;}
.opening-card{background:#fff;border:1px solid var(--gl);border-radius:10px;padding:18px 20px;cursor:pointer;transition:border-color .15s,box-shadow .15s;position:relative;}
.opening-card:hover{border-color:var(--gm);box-shadow:0 2px 8px rgba(0,0,0,.06);}
.oc-brand{font-size:10px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:#999;margin-bottom:6px;}
.oc-name{font-size:16px;font-weight:500;color:var(--black);margin-bottom:4px;}
.oc-date{font-size:12px;color:#777;margin-bottom:14px;}
.oc-progress{height:4px;background:var(--gl);border-radius:99px;overflow:hidden;margin-bottom:8px;}
.oc-bar{height:100%;background:var(--red);border-radius:99px;transition:width .3s;}
.oc-stats{display:flex;align-items:center;justify-content:space-between;}
.oc-pct{font-size:12px;font-weight:500;color:var(--red);}
.oc-count{font-size:11px;color:#999;}
.oc-status{display:inline-block;font-size:10px;font-weight:500;letter-spacing:.06em;text-transform:uppercase;padding:3px 8px;border-radius:99px;margin-bottom:10px;}
.status-upcoming{background:#e8f0fa;color:#1a6faf;}
.status-active{background:#fdeaea;color:#a31a1a;}
.status-done{background:#eaf3e8;color:#2a6a1a;}
.oc-delete{position:absolute;top:14px;right:14px;background:none;border:none;cursor:pointer;color:#ccc;font-size:16px;line-height:1;padding:2px 5px;border-radius:4px;}
.oc-delete:hover{color:var(--red);background:#fdeaea;}
.empty-state{grid-column:1/-1;text-align:center;padding:60px 20px;}
.empty-icon{font-size:40px;margin-bottom:14px;opacity:.3;}
.empty-title{font-size:16px;font-weight:500;color:#888;margin-bottom:6px;}
.empty-sub{font-size:13px;color:#aaa;}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:100;align-items:center;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal{background:#fff;border-radius:12px;padding:28px;width:100%;max-width:420px;margin:20px;}
.modal-title{font-size:18px;font-weight:500;margin-bottom:20px;}
.mf-label{display:block;font-size:10px;font-weight:500;letter-spacing:.12em;text-transform:uppercase;color:#666;margin-bottom:5px;}
.mf-input{width:100%;border:1.5px solid var(--gm);border-radius:6px;padding:9px 12px;font-family:'DM Sans',sans-serif;font-size:14px;color:var(--black);background:var(--cream);outline:none;margin-bottom:14px;}
.mf-input:focus{border-color:var(--red);}
.modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:6px;}
.btn-cancel{background:none;border:1px solid var(--gm);border-radius:6px;padding:8px 16px;font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer;}
.btn-cancel:hover{background:var(--cream);}
.btn-create{background:var(--red);color:#fff;border:none;border-radius:6px;padding:8px 18px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;}
.btn-create:hover{opacity:.88;}
.inputs-bar{background:#fff;border-bottom:1px solid var(--gl);padding:16px 40px;display:flex;gap:16px;align-items:flex-end;flex-wrap:wrap;}
.ig label{display:block;font-size:10px;font-weight:500;letter-spacing:.12em;text-transform:uppercase;color:#666;margin-bottom:5px;}
.ig input{border:1.5px solid var(--gm);border-radius:6px;padding:8px 12px;font-family:'DM Sans',sans-serif;font-size:14px;color:var(--black);background:var(--cream);outline:none;min-width:180px;}
.ig input:focus{border-color:var(--red);}
.print-btn{padding:9px 18px;background:var(--red);color:#fff;border:none;border-radius:6px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;display:flex;align-items:center;gap:7px;margin-left:auto;}
.print-btn:hover{opacity:.85;}
.legend-bar{padding:12px 40px;display:flex;gap:18px;flex-wrap:wrap;border-bottom:1px solid var(--gl);background:var(--cream);}
.li{display:flex;align-items:center;gap:7px;font-size:12px;color:#555;}
.ldot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.main{padding:28px 40px 60px;max-width:860px;}
.timeline{position:relative;padding-left:28px;}
.tl-line{position:absolute;left:8px;top:0;bottom:0;width:1.5px;background:var(--gm);}
.phase-lbl{font-size:10px;font-weight:500;letter-spacing:.14em;text-transform:uppercase;color:#888;margin:26px 0 9px;padding-left:4px;}
.phase-lbl:first-child{margin-top:0;}
.ms-row{display:flex;align-items:flex-start;gap:13px;margin-bottom:9px;}
.ms-dot{width:15px;height:15px;border-radius:50%;flex-shrink:0;margin-top:6px;position:relative;z-index:1;border:3px solid var(--cream);}
.ms-dot.dim{opacity:.35;}
.ms-card{background:#fff;border:1px solid var(--gl);border-radius:8px;padding:10px 15px;flex:1;}
.ms-card.is-open{border-color:var(--red);border-width:1.5px;background:#fff9f9;}
.ms-card.is-dim{opacity:.5;}
.ms-meta{display:flex;align-items:center;gap:7px;flex-wrap:wrap;margin-bottom:4px;}
.ms-date{font-size:11px;font-weight:500;color:#888;}
.ms-badge{font-size:11px;font-weight:500;background:var(--red);color:#fff;padding:2px 8px;border-radius:99px;margin-left:auto;}
.ms-optional{font-size:10px;font-weight:500;background:#f0ede4;color:#888;padding:2px 8px;border-radius:99px;margin-left:auto;letter-spacing:.04em;}
.owner-tag{font-size:11px;color:#555;background:var(--cream);border:1px solid var(--gm);padding:2px 8px;border-radius:99px;cursor:pointer;white-space:nowrap;display:inline-flex;align-items:center;gap:4px;font-family:'DM Sans',sans-serif;}
.owner-tag:hover{border-color:var(--red);color:var(--red);}
.ei{font-size:10px;opacity:.5;}
.owner-inp{font-size:11px;font-family:'DM Sans',sans-serif;border:1.5px solid var(--red);border-radius:99px;padding:2px 8px;outline:none;color:var(--black);background:#fff;min-width:130px;}
.ms-title{font-size:14px;font-weight:500;color:var(--black);line-height:1.35;}
.ms-detail{font-size:12px;color:#666;margin-top:2px;line-height:1.5;}
.subtasks{margin-top:8px;padding-top:8px;border-top:1px solid var(--gl);}
.subtask{display:flex;align-items:flex-start;gap:8px;font-size:12px;color:#555;padding:3px 0;}
.subtask input[type=checkbox]{margin-top:2px;accent-color:var(--red);flex-shrink:0;cursor:pointer;}
.subtask-text{line-height:1.4;}
.subtask input[type=checkbox]:checked+.subtask-text{text-decoration:line-through;color:#aaa;}
.note-area{width:100%;margin-top:8px;border:1px solid var(--gl);border-radius:6px;padding:7px 10px;font-family:'DM Sans',sans-serif;font-size:12px;color:#444;background:#fafaf5;resize:vertical;outline:none;min-height:36px;}
.note-area:focus{border-color:var(--red);}
.note-area::placeholder{color:#bbb;}
.toggle-note{font-size:11px;color:#999;background:none;border:none;cursor:pointer;padding:4px 0 0;font-family:'DM Sans',sans-serif;display:flex;align-items:center;gap:4px;}
.toggle-note:hover{color:var(--red);}
@media print{
  #view-dashboard,.inputs-bar,.print-btn,.toggle-note,.back-btn{display:none!important;}
  #view-detail{display:block!important;}
  .note-area{border:none;background:transparent;resize:none;}
  body{background:#fff;}
  .hdr,.ftr{-webkit-print-color-adjust:exact;print-color-adjust:exact;}
  .ms-card{break-inside:avoid;}
}
@media(max-width:600px){
  .hdr,.inputs-bar,.legend-bar,.main,.ftr,.dash-toolbar,.dash-grid{padding-left:20px;padding-right:20px;}
  .inputs-bar{flex-direction:column;}
  .print-btn,.new-btn{margin-left:0;}
}
</style>
</head>
<body>

<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-title">Ny åpning</div>
    <label class="mf-label" for="m-brand">Merkevare</label>
    <input class="mf-input" id="m-brand" placeholder="Jordbærpikene / Sabrura / Big Bite">
    <label class="mf-label" for="m-loc">Lokasjon</label>
    <input class="mf-input" id="m-loc" placeholder="f.eks. Tonsenter, Moss">
    <label class="mf-label" for="m-date">Åpningsdato</label>
    <input class="mf-input" type="date" id="m-date">
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Avbryt</button>
      <button class="btn-create" onclick="createOpening()">Opprett kjøreplan</button>
    </div>
  </div>
</div>

<div id="view-dashboard">
  <div class="hdr">
    <div class="hdr-left">
      <div class="hdr-eye">Bitastad AS</div>
      <div class="hdr-title">Nyåpninger</div>
      <div class="hdr-sub" id="dash-sub">Oversikt over alle pågående og kommende åpninger</div>

</div>

<div id="view-detail">
  <div class="hdr">
    <div class="hdr-left">
      <div class="hdr-eye" id="d-eye">Jordbærpikene / Bitastad</div>
      <div class="hdr-title">Kjøreplan – nyåpning</div>

    <div class="li"><div class="ldot" style="background:#da2a1c"></div>Åpningsdag</div>

      <div id="tl"></div>
    </div>

<script>

var DC={pre:"#888780",prep:"#1a6faf",open:"#da2a1c",after:"#4a7a3a"};
var openings=[];
var currentId=null;

function save(){try{localStorage.setItem("bitastad_openings",JSON.stringify(openings));}catch(e){}}
function load(){try{var d=localStorage.getItem("bitastad_openings");if(d)openings=JSON.parse(d);}catch(e){openings=[];}}
function addDays(d,n){var r=new Date(d);r.setDate(r.getDate()+n);return r;}
function fmt(d){return new Date(d).toLocaleDateString("nb-NO",{day:"numeric",month:"short",year:"numeric"});}

function getStatus(dateStr){
  if(!dateStr)return"upcoming";
  var t=new Date().getTime();
  var op=new Date(dateStr).getTime();
  var d90=90*24*60*60*1000;
  if(t<op)return"upcoming";
  if(t<op+d90)return"active";
  return"done";
}

function getProgress(id){
  var key="checks_"+id;
  try{
    var d=JSON.parse(localStorage.getItem(key)||"{}");
    var total=0,done=0;
    ITEMS.forEach(function(m,mi){if(m.subs)m.subs.forEach(function(_,si){total++;if(d[mi+"_"+si])done++;});});
    return total>0?Math.round(done/total*100):0;
  }catch(e){return 0;}
}

function renderDash(){
  load();
  var grid=document.getElementById("dash-grid");
  var count=document.getElementById("dash-count");
  count.textContent=openings.length===0?"Ingen åpninger registrert":openings.length+" åpning"+(openings.length===1?"":"er");
  var dsub=document.getElementById("dash-sub");
  var active=openings.filter(function(o){return getStatus(o.date)==="active";}).length;
  dsub.textContent=active>0?active+" aktiv"+(active===1?" åpning":" åpninger")+" pågår nå":"Oversikt over alle pågående og kommende åpninger";
  if(openings.length===0){
    grid.innerHTML='<div class="empty-state"><div class="empty-icon">🏗</div><div class="empty-title">Ingen åpninger ennå</div><div class="empty-sub">Trykk «Ny åpning» for å komme i gang</div></div>';
    return;
  }
  grid.innerHTML="";
  openings.forEach(function(o){
    var pct=getProgress(o.id);
    var st=getStatus(o.date);
    var stLabel={upcoming:"Kommende",active:"Pågår nå",done:"Ferdig"}[st];
    var stClass="status-"+st;
    var card=document.createElement("div");
    card.className="opening-card";
    card.innerHTML='<div class="oc-brand">'+o.brand+'</div>'
      +'<div class="oc-name">'+o.location+'</div>'
      +'<div class="oc-date">'+(o.date?fmt(o.date):"Dato ikke satt")+'</div>'
      +'<span class="oc-status '+stClass+'">'+stLabel+'</span>'
      +'<div class="oc-progress"><div class="oc-bar" style="width:'+pct+'%"></div></div>'
      +'<div class="oc-stats"><span class="oc-pct">'+pct+'% fullført</span><span class="oc-count">Klikk for å åpne</span></div>'
      +'<button class="oc-delete" title="Slett åpning" onclick="deleteOpening(event,\''+o.id+'\')">✕</button>';
    card.onclick=function(){openDetail(o.id);};
    grid.appendChild(card);
  });
}

function openModal(){document.getElementById("modal").classList.add("open");document.getElementById("m-loc").focus();}
function closeModal(){document.getElementById("modal").classList.remove("open");document.getElementById("m-brand").value="";document.getElementById("m-loc").value="";document.getElementById("m-date").value="";}

function createOpening(){
  var brand=document.getElementById("m-brand").value.trim()||"Jordbærpikene";
  var loc=document.getElementById("m-loc").value.trim();
  var date=document.getElementById("m-date").value;
  if(!loc){document.getElementById("m-loc").focus();return;}
  var id="op_"+Date.now();
  openings.push({id:id,brand:brand,location:loc,date:date});
  save();
  closeModal();
  openDetail(id);
}

function deleteOpening(e,id){
  e.stopPropagation();
  if(!confirm("Slette denne åpningen?"))return;
  openings=openings.filter(function(o){return o.id!==id;});
  try{localStorage.removeItem("checks_"+id);localStorage.removeItem("notes_"+id);}catch(ex){}
  save();
  renderDash();
}

function goBack(){
  saveDetailState();
  document.getElementById("view-detail").style.display="none";
  document.getElementById("view-dashboard").style.display="block";
  renderDash();
}

function saveDetailState(){
  if(!currentId)return;
  var op=openings.find(function(o){return o.id===currentId;});
  if(!op)return;
  op.brand=document.getElementById("d-brand").value||op.brand;
  op.location=document.getElementById("d-loc").value||op.location;
  op.date=document.getElementById("d-date").value||op.date;
  save();
  var checks={};
  document.querySelectorAll(".subtask input[type=checkbox]").forEach(function(cb){checks[cb.dataset.key]=cb.checked;});
  try{localStorage.setItem("checks_"+currentId,JSON.stringify(checks));}catch(e){}
  var notes={};
  document.querySelectorAll(".note-area").forEach(function(na){if(na.dataset.key&&na.value)notes[na.dataset.key]=na.value;});
  try{localStorage.setItem("notes_"+currentId,JSON.stringify(notes));}catch(e){}
}

function openDetail(id){
  load();
  var op=openings.find(function(o){return o.id===id;});
  if(!op)return;
  currentId=id;
  document.getElementById("view-dashboard").style.display="none";
  document.getElementById("view-detail").style.display="block";
  document.getElementById("d-brand").value=op.brand||"";
  document.getElementById("d-loc").value=op.location||"";
  document.getElementById("d-date").value=op.date||"";
  renderDetail();
  ["d-date","d-loc","d-brand"].forEach(function(fid){document.getElementById(fid).oninput=function(){renderDetail();};});
}

function renderDetail(){
  if(!currentId)return;
  var loc=document.getElementById("d-loc").value||"lokasjon ikke angitt";
  var brand=document.getElementById("d-brand").value||"Jordbærpikene";
  var dv=document.getElementById("d-date").value;
  var base=dv?new Date(dv):null;
  document.getElementById("d-eye").textContent=brand+" / Bitastad";
  document.getElementById("d-sub").textContent=(base&&loc!=="lokasjon ikke angitt")?brand+" — "+loc+" — åpner "+fmt(base):"Fyll inn dato og lokasjon";
  document.getElementById("d-ftr-brand").textContent=brand;

  var checks={};
  var notes={};
  try{checks=JSON.parse(localStorage.getItem("checks_"+currentId)||"{}");}catch(e){}
  try{notes=JSON.parse(localStorage.getItem("notes_"+currentId)||"{}");}catch(e){}

  var el=document.getElementById("tl");
  el.innerHTML="";
  var lastLabel="";

  ITEMS.forEach(function(m,idx){
    if(m.label&&m.label!==lastLabel){var p=document.createElement("div");p.className="phase-lbl";p.textContent=m.label;el.appendChild(p);lastLabel=m.label;}

    var row=document.createElement("div");row.className="ms-row";
    var dot=document.createElement("div");dot.className="ms-dot"+(m.optional?" dim":"");dot.style.background=DC[m.phase];
    var card=document.createElement("div");card.className="ms-card"+(m.phase==="open"?" is-open":"")+(m.optional?" is-dim":"");

    var meta=document.createElement("div");meta.className="ms-meta";
    var ds=document.createElement("span");ds.className="ms-date";
    if(base){ds.textContent=m.o===-999?"Før signering":m.o===0?fmt(base):(m.o<0?"T"+m.o:"T+"+m.o)+" dager — "+fmt(addDays(base,m.o));}
    else{ds.textContent=m.o===-999?"Før signering":m.o===0?"Åpningsdag":m.o<0?"T"+m.o+" dager":"T+"+m.o+" dager";}
    meta.appendChild(ds);

    if(m.badge){var b=document.createElement("span");b.className="ms-badge";b.textContent=m.badge;meta.appendChild(b);}
    if(m.optional){var opt=document.createElement("span");opt.className="ms-optional";opt.textContent="Valgfritt";meta.appendChild(opt);}

    var ownerVal=m.owner;
    var span=document.createElement("span");span.className="owner-tag";span.innerHTML=ownerVal+' <span class="ei">✎</span>';span.title="Klikk for å endre ansvarlig";
    span.onclick=function(){
      var inp=document.createElement("input");inp.type="text";inp.className="owner-inp";inp.value=ownerVal;
      inp.onclick=function(e){e.stopPropagation();};
      inp.onblur=function(){ownerVal=inp.value||ownerVal;span.innerHTML=ownerVal+' <span class="ei">✎</span>';meta.replaceChild(span,inp);};
      inp.onkeydown=function(e){if(e.key==="Enter")inp.blur();if(e.key==="Escape"){inp.value=ownerVal;inp.blur();}};
      meta.replaceChild(inp,span);inp.focus();inp.select();
    };
    meta.appendChild(span);

    var ti=document.createElement("div");ti.className="ms-title";ti.textContent=m.title.replace("{LOC}",loc);
    var de=document.createElement("div");de.className="ms-detail";de.textContent=m.detail;
    card.appendChild(meta);card.appendChild(ti);card.appendChild(de);

    if(m.subs&&m.subs.length){
      var st=document.createElement("div");st.className="subtasks";
      m.subs.forEach(function(s,si){
        var key=idx+"_"+si;
        var sr=document.createElement("label");sr.className="subtask";
        var cb=document.createElement("input");cb.type="checkbox";cb.dataset.key=key;cb.checked=!!checks[key];
        cb.onchange=function(){var c={};try{c=JSON.parse(localStorage.getItem("checks_"+currentId)||"{}");}catch(e){}c[key]=cb.checked;try{localStorage.setItem("checks_"+currentId,JSON.stringify(c));}catch(e){}renderDash();};
        var tx=document.createElement("span");tx.className="subtask-text";tx.textContent=s;
        sr.appendChild(cb);sr.appendChild(tx);st.appendChild(sr);
      });
      card.appendChild(st);
    }

    var noteKey="note_"+idx;
    var tn=document.createElement("button");tn.className="toggle-note";
    var na=document.createElement("textarea");na.className="note-area";na.placeholder="Notat...";na.dataset.key=noteKey;na.rows=2;
    var savedNote=notes[noteKey]||"";
    if(savedNote){na.value=savedNote;na.style.display="block";tn.innerHTML="− Skjul notat";}
    else{na.style.display="none";tn.innerHTML="＋ Legg til notat";}
    na.oninput=function(){var n={};try{n=JSON.parse(localStorage.getItem("notes_"+currentId)||"{}");}catch(e){}n[noteKey]=na.value;try{localStorage.setItem("notes_"+currentId,JSON.stringify(n));}catch(e){}};
    tn.onclick=function(){if(na.style.display==="none"){na.style.display="block";tn.innerHTML="− Skjul notat";na.focus();}else{na.style.display="none";tn.innerHTML="＋ Legg til notat";}};
    card.appendChild(tn);card.appendChild(na);

    row.appendChild(dot);row.appendChild(card);el.appendChild(row);
  });
}

load();renderDash();
document.getElementById("modal").addEventListener("click",function(e){if(e.target===this)closeModal();});
