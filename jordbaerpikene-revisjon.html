<title>Jordbærpikene – Internrevisjon</title>
<style>
:root{
  --plum:#da2a1c; --plum-d:#b3231a; --berry:#da2a1c; --cream:#f5f5ea; --paper:#ffffff;
  --ink:#000000; --muted:#6f6357; --line:#e6e3d6;
  --green:#1f8a4c; --green-bg:#e6f4ec; --amber:#c77f1a; --amber-bg:#fbf1e0; --red:#da2a1c; --red-bg:#fbe7e9;
  --brun:#cda177; --gronn:#708573;
  --wine:#7a1d2e; --wine-bg:#f6e9ec;
  --shadow:0 1px 2px rgba(36,26,32,.06),0 8px 24px rgba(36,26,32,.06);
  --r:14px; font-size:16px;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0}
body{background:var(--cream);color:var(--ink);font-family:"Maison Neue",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;line-height:1.45;padding-bottom:env(safe-area-inset-bottom)}
h1,h2,h3{font-family:"Signal",Georgia,"Times New Roman",serif;text-transform:uppercase;letter-spacing:.06em;font-weight:600;margin:0}
.app{max-width:560px;margin:0 auto;min-height:100vh}
header.top{position:sticky;top:0;z-index:30;background:linear-gradient(135deg,var(--plum),var(--plum-d));color:#fff;padding:calc(env(safe-area-inset-top) + 14px) 18px 14px;box-shadow:var(--shadow)}
.top .brand{display:flex;align-items:center;gap:10px}
.top .dot{width:26px;height:26px;border-radius:50%;background:radial-gradient(circle at 35% 30%,#ff7eb0,var(--berry));box-shadow:inset 0 0 0 2px rgba(255,255,255,.35)}
.top h1{font-size:1.18rem;color:#fff}
.top .sub{font-size:.72rem;opacity:.8;margin-top:2px;letter-spacing:.04em;text-transform:uppercase}
.crumb{font-size:.82rem;opacity:.92;margin-top:10px;display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.crumb button{background:rgba(255,255,255,.16);border:0;color:#fff;font:inherit;font-size:.8rem;padding:5px 11px;border-radius:999px}
main{padding:18px 16px 96px}
.card{background:var(--paper);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);padding:16px;margin:0 0 14px}
.muted{color:var(--muted)}.small{font-size:.82rem}.tiny{font-size:.74rem}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;border:0;border-radius:12px;font:inherit;font-weight:600;padding:14px 16px;cursor:pointer;width:100%;font-size:1rem}
.btn.primary{background:var(--plum);color:#fff}.btn.berry{background:var(--berry);color:#fff}
.btn.ghost{background:transparent;border:1.5px solid var(--line);color:var(--ink)}
.btn.sm{width:auto;padding:9px 13px;font-size:.86rem;border-radius:10px}
.btn:active{transform:translateY(1px)}
.row{display:flex;gap:10px}.row.wrap{flex-wrap:wrap}
.pill{display:inline-flex;align-items:center;gap:6px;font-size:.72rem;font-weight:700;padding:4px 9px;border-radius:999px;letter-spacing:.02em;text-transform:uppercase}
.pill.krit{background:var(--red-bg);color:var(--red)}.pill.vikt{background:var(--amber-bg);color:var(--amber)}
.pill.anbe{background:#eef2f6;color:#5a6b7a}.pill.flag{background:#2a1018;color:#ff8aa6}
.cat{display:inline-block;font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--berry)}
.assume{background:var(--green-bg);border:1px solid #bfe3cc;border-radius:12px;padding:13px 14px;font-size:.84rem}
.assume b{color:var(--green)}
.warn{background:var(--amber-bg);border:1px solid #f0dcb6;border-radius:12px;padding:11px 13px;font-size:.82rem;margin-top:10px}
.warn b{color:var(--amber)}
.menu-item{display:flex;justify-content:space-between;align-items:center;gap:12px;padding:14px 4px;border-bottom:1px solid var(--line)}
.menu-item:last-child{border-bottom:0}.menu-item .lab{font-weight:600}
.prog{height:8px;border-radius:999px;background:var(--line);overflow:hidden;margin-top:8px}
.prog>i{display:block;height:100%;background:linear-gradient(90deg,var(--berry),var(--plum));width:0;transition:width .3s}
.cp .q{font-weight:600;font-size:1.02rem;margin:8px 0 4px}
.cp .why{font-size:.84rem;color:var(--muted);margin:0 0 12px}
.acc{border:1px solid var(--line);border-radius:10px;margin:10px 0;overflow:hidden}
.acc>summary{list-style:none;cursor:pointer;padding:11px 13px;font-size:.82rem;font-weight:600;color:var(--plum);background:#faf5f1;display:flex;justify-content:space-between;align-items:center}
.acc>summary::-webkit-details-marker{display:none}
.acc .body{padding:12px 13px;font-size:.84rem}
.acc ul{margin:4px 0 0;padding-left:18px}.acc li{margin:3px 0}
.score-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:6px}
.sbtn{border:1.5px solid var(--line);background:#fff;border-radius:11px;padding:12px 6px;font:inherit;font-weight:700;font-size:.82rem;cursor:pointer;text-align:center;color:var(--ink);line-height:1.15}
.sbtn small{display:block;font-weight:500;font-size:.66rem;color:var(--muted);margin-top:3px}
.sbtn[data-on="ok"]{border-color:var(--green);background:var(--green-bg);color:var(--green)}
.sbtn[data-on="avvik"]{border-color:var(--red);background:var(--red-bg);color:var(--red)}
.sbtn[data-on="na"]{border-color:#9aa7b2;background:#eef2f6;color:#5a6b7a}
.flagnote{margin-top:11px;background:var(--red-bg);border:1px solid #f3c4cc;color:var(--red);border-radius:10px;padding:10px 12px;font-size:.82rem;font-weight:600;display:none}
.flagnote.show{display:block}
.dev{margin-top:12px;border-top:2px dashed var(--line);padding-top:12px;display:none}
.dev.show{display:block}
.dev label{display:block;font-size:.78rem;font-weight:700;text-transform:uppercase;letter-spacing:.03em;color:var(--muted);margin:11px 0 5px}
.dev input,.dev select,.dev textarea{width:100%;font:inherit;font-size:.92rem;padding:11px 12px;border:1.5px solid var(--line);border-radius:10px;background:#fff;color:var(--ink)}
.dev textarea{min-height:62px;resize:vertical}
.chip{display:inline-block;font-size:.8rem;border:1.5px solid var(--line);background:#fff;border-radius:999px;padding:7px 12px;margin:4px 6px 0 0;cursor:pointer}
.chip.on{background:var(--plum);color:#fff;border-color:var(--plum)}
.frist{font-weight:700}.frist.um{color:var(--red)}.frist.t24{color:var(--amber)}.frist.d14{color:var(--plum)}
.seg{display:flex;gap:0;border:1.5px solid var(--line);border-radius:11px;overflow:hidden;margin-top:6px}
.seg button{flex:1;border:0;background:#fff;font:inherit;font-weight:700;padding:11px;cursor:pointer;color:var(--muted)}
.seg button.on{background:var(--plum);color:#fff}
.fld{width:100%;padding:11px;border:1.5px solid var(--line);border-radius:10px;font:inherit}
.fab{position:fixed;left:0;right:0;bottom:0;z-index:40;max-width:560px;margin:0 auto;padding:10px 16px calc(env(safe-area-inset-bottom) + 10px);background:linear-gradient(to top,var(--cream) 70%,transparent);display:flex;gap:10px}
.kpi{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.kpi .k{background:#faf5f1;border:1px solid var(--line);border-radius:12px;padding:13px}
.kpi .k b{font-size:1.5rem;display:block;font-family:Georgia,serif}
.statusbar{border-radius:14px;padding:16px;color:#fff;text-align:center;margin-bottom:14px}
.statusbar.GRØNN{background:linear-gradient(135deg,#1f8a4c,#136b39)}
.statusbar.GUL{background:linear-gradient(135deg,#d79320,#b4730f)}
.statusbar.RØD{background:linear-gradient(135deg,#c0203b,#8e132a)}
.statusbar .big{font-size:2.4rem;font-family:Georgia,serif;line-height:1}
.devcard{border:1px solid var(--line);border-left-width:5px;border-radius:10px;padding:11px 13px;margin:8px 0;font-size:.86rem}
.devcard.k{border-left-color:var(--red)}.devcard.v{border-left-color:var(--amber)}.devcard.a{border-left-color:#5a6b7a}
.devcard .h{font-weight:700;display:flex;justify-content:space-between;gap:8px}
.recur{background:#2a1018;color:#ff9bb3;font-size:.7rem;font-weight:700;padding:2px 7px;border-radius:999px}
.hist{display:flex;justify-content:space-between;align-items:center;padding:12px 4px;border-bottom:1px solid var(--line)}
.hist .s{font-weight:700;font-family:Georgia,serif}
.s-GRØNN{color:var(--green)}.s-GUL{color:var(--amber)}.s-RØD{color:var(--red)}
hr.sep{border:0;border-top:1px solid var(--line);margin:16px 0}
.sectionhead{display:flex;align-items:center;gap:10px;margin:22px 2px 8px}
.sectionhead .n{font-family:Georgia,serif;color:var(--berry);font-size:1.1rem}
.sectionhead.alk .n{color:var(--wine)}
.sectionhead h3{font-size:1.02rem}
a.link{color:var(--berry);font-weight:600;text-decoration:none;cursor:pointer}
.copybox{white-space:pre-wrap;font-family:ui-monospace,Menlo,Consolas,monospace;font-size:.74rem;background:#faf5f1;border:1px solid var(--line);border-radius:10px;padding:12px;max-height:280px;overflow:auto}
.alkcard{border-left:4px solid var(--wine)}
@media (prefers-reduced-motion:reduce){*{transition:none!important}}
@media print{
  body{background:#fff}
  header.top,.fab,.no-print,.acc,.score-row{display:none!important}
  main{padding:0!important}
  .app{max-width:none}
  .card{box-shadow:none;border:1px solid #ccc;break-inside:avoid;page-break-inside:avoid}
  .devcard{break-inside:avoid;page-break-inside:avoid}
  .print-head{display:block!important;margin-bottom:14px;border-bottom:2px solid var(--plum);padding-bottom:10px}
  #ledvur-print{display:block!important}
  .statusbar{-webkit-print-color-adjust:exact;print-color-adjust:exact}
  a[href]:after{content:""}
}
.print-head{display:none}
.toast{position:fixed;left:50%;bottom:84px;transform:translateX(-50%) translateY(10px);background:#241a20;color:#fff;padding:9px 16px;border-radius:999px;font-size:.82rem;font-weight:600;opacity:0;transition:opacity .2s,transform .2s;z-index:60;pointer-events:none}
.toast.show{opacity:.96;transform:translateX(-50%) translateY(0)}
.thumbs{display:flex;flex-wrap:wrap;gap:8px;margin:6px 0}
.thumb{width:72px;height:72px;object-fit:cover;border-radius:8px;border:1px solid var(--line)}
.thumbwrap{position:relative;display:inline-block}
.thumbwrap button{position:absolute;top:-6px;right:-6px;width:22px;height:22px;border-radius:50%;border:0;background:var(--red);color:#fff;font-weight:700;line-height:1;cursor:pointer}
.nareason{display:none;margin-top:8px}
.nareason.show{display:block}
.nareason input{width:100%;font:inherit;font-size:.9rem;padding:9px 11px;border:1.5px solid var(--line);border-radius:10px}
.custt{font-size:.9rem;padding:9px 11px;border:1.5px solid var(--line);border-radius:10px}
.lockbanner{background:#eef2f6;border:1px solid #cfd9e2;border-radius:12px;padding:12px 14px;font-size:.86rem;color:#41525e;margin-bottom:14px}
.lockbanner b{color:#2a3a45}
.incomplete{background:var(--amber-bg);border:1px solid #f0dcb6;border-radius:12px;padding:12px 14px;font-size:.86rem;margin-bottom:14px}
.incomplete b{color:var(--amber)}
.finbadge{display:inline-block;background:var(--green-bg);color:var(--green);font-weight:700;font-size:.72rem;padding:4px 10px;border-radius:999px}
.fuctl{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.fuctl select,.fuctl input{font:inherit;font-size:.82rem;padding:8px 9px;border:1.5px solid var(--line);border-radius:9px;background:#fff;flex:1;min-width:120px}
@media print{.fuctl,.photoin{display:none!important}}
.brandwrap{text-align:center}
.jplogo{width:190px;max-width:60%;height:auto;display:block;margin:2px auto 6px}
header.top .sub{font-size:.7rem;text-transform:uppercase;letter-spacing:.14em;opacity:.92;text-align:center}
</style>

/* =================== STORAGE =================== */
const mem={};
const hasWS=(typeof window!=="undefined"&&window.storage&&window.storage.get);
const hasLS=(()=>{try{const k="__jbp_t";localStorage.setItem(k,"1");localStorage.removeItem(k);return true;}catch(e){return false;}})();
async function sget(k){
  if(hasWS){try{const r=await window.storage.get(k);return r?JSON.parse(r.value):null;}catch(e){}}
  if(hasLS){const v=localStorage.getItem(k);return v?JSON.parse(v):null;}
  return mem[k]??null;}
async function sset(k,v){mem[k]=v;
  if(hasWS){try{await window.storage.set(k,JSON.stringify(v));return;}catch(e){}}
  if(hasLS){try{localStorage.setItem(k,JSON.stringify(v));return;}catch(e){}}}
async function slist(p){
  if(hasWS){try{const r=await window.storage.list(p);if(r)return r.keys;}catch(e){}}
  if(hasLS){return Object.keys(localStorage).filter(x=>x.startsWith(p));}
  return Object.keys(mem).filter(x=>x.startsWith(p));}
async function sdel(k){delete mem[k];
  if(hasWS){try{await window.storage.delete(k);return;}catch(e){}}
  if(hasLS){try{localStorage.removeItem(k);}catch(e){}}}

function pointsFor(a){return CP.filter(p=>{if(p.alk&&!a.harAlkohol)return false;if(p.onb&&!a.nyttLederbytte)return false;return a.mode==="hurtig"?p.hurtig:true;});}

/* =================== SCORING =================== */
function compute(a){
  const cats=Object.keys(WEIGHTS),catAgg={};cats.forEach(c=>catAgg[c]=[0,0]);
  const pts=pointsFor(a);let answered=0,applicable=0,ok=0;
  const redFlags=[],kritisk=[],viktig=[],anbefalt=[],avvik=[];
  pts.forEach(p=>{const v=a.answers[p.id];if(v===undefined)return;answered++;if(v==="na")return;applicable++;
    catAgg[p.kat][1]++;
    if(v==="avvik"){avvik.push(p);if(p.flag)redFlags.push(p);else if(p.kl==="kritisk")kritisk.push(p);else if(p.kl==="viktig")viktig.push(p);else anbefalt.push(p);}
    else{ok++;catAgg[p.kat][0]++;}});
  // Status: rødt flagg -> RØD; kritisk/viktig avvik -> GUL; ellers (kun anbefalt eller ingen) -> GRØNN
  const status=redFlags.length?"RØD":(kritisk.length||viktig.length)?"GUL":"GRØNN";
  const pct=applicable>0?Math.round(ok/applicable*100):0; // sekundær: % innen standard
  const catPct={};for(const c of cats){const[g,m]=catAgg[c];catPct[c]=m>0?Math.round(g/m*100):null;}
  const total=pts.length;const complete=answered===total;
  return {pct,status,redFlags,kritisk,viktig,anbefalt,avvik,answered,total,complete,catPct};
}

/* =================== RECURRING =================== */
async function recurringIds(currentId){
  const keys=await slist("audit_");const ids=new Set();
  for(const k of keys){if(k.includes(currentId))continue;const a=await sget(k);if(!a||!a.devs)continue;
    Object.keys(a.devs).forEach(id=>{if(a.devs[id]&&a.devs[id].active)ids.add(id);});}
  return ids;
}

function finish(){A.updatedAt=Date.now();sset(A.id,A);pushAudit(A);go('home');}
function buildText(){
  const r=compute(A);const devs=CP.filter(p=>A.devs[p.id]&&A.devs[p.id].active).map(p=>({p,d:A.devs[p.id]}));
  let t=`JORDBÆRPIKENE – INTERNREVISJON\n${A.avdeling||"Uten avdeling"} | ${A.mode==="hurtig"?"Hurtigrevisjon":"Full revisjon"}${A.harAlkohol?" | m/skjenking":""} | ${fmtDate(A.date)}\n`;
  t+=`Ansvarlig: ${A.ansvarlig||"-"}  Revisor: ${A.revisor||"-"}${A.finalized?" | FERDIGSTILT "+fmtDate(A.finalizedAt)+" av "+(A.finalizedBy||"-"):""}\n${r.complete?"":"** UFULLSTENDIG: "+r.answered+"/"+r.total+" besvart – foreløpig vurdering **\n"}\nRESULTAT: ${r.status} – ${r.avvik.length} avvik${r.redFlags.length?" ("+r.redFlags.length+" RØDT FLAGG)":""}${r.complete?" – "+r.pct+"% innen standard":""}\n`;
  CATORDER.forEach(c=>{if(r.catPct[c]!=null)t+=`  ${CATNAME[c]}: ${r.catPct[c]}% innen standard\n`;});
  if(r.redFlags.length){t+=`\nRØDE FLAGG (umiddelbar handling):\n`;r.redFlags.forEach(p=>t+=`  - ${p.id}: ${p.q}\n`);}
  t+=`\nAVVIK & OPPFØLGING (${devs.length}):\n`;
  devs.forEach(({p,d})=>{const f=fristFor(p);t+=`\n[${p.id} – ${p.kl}${p.flag?" – RED FLAG":""}${p.alk?" – skjenking":""}] ${d.status||"Åpen"}\n  Punkt: ${p.q}\n`;
    if(d.beskrivelse)t+=`  Funn: ${d.beskrivelse}\n`;if(d.rotaarsak)t+=`  Rotårsak: ${d.rotaarsak}\n`;
    if(d.tiltak&&d.tiltak.length)t+=`  Tiltak: ${d.tiltak.join("; ")}\n`;
    t+=`  Ansvarlig: ${d.ansvarlig||"-"} | Frist: ${fmtFrist(d.frist)||fristDateStr(f.days)} (${f.lab})\n`;if(d.verifisering)t+=`  Verifiseres: ${d.verifisering}\n`;t+=`  Effekt: ${d.verifisert||"Ikke verifisert"}${d.verifisertDato?" ("+fmtFrist(d.verifisertDato)+")":""}\n`;if(d.lukketAv||d.lukketNotat)t+=`  Lukket av: ${d.lukketAv||"-"}${d.lukketNotat?" – "+d.lukketNotat:""}\n`;if(d.bilder&&d.bilder.length)t+=`  Bilder vedlagt: ${d.bilder.length}\n`;});
  if(A.ledelsesvurdering)t+=`\nLEDELSESVURDERING:\n${A.ledelsesvurdering}\n`;
  t+=`\nMerk: Helsemessige avvik (matforgiftning/beinrester/allergisk reaksjon) varsles Regionleder umiddelbart + avvik@jbp.no.\n`;
  return t;}
function showText(){$("#txtwrap").innerHTML=`<div class="copybox">${esc(buildText())}</div><button class="btn berry sm" style="margin-top:8px" onclick="copyText(event)">Kopiér</button>`;}
function copyText(ev){navigator.clipboard?.writeText(buildText()).then(()=>{ev.target.textContent="Kopiert ✓";},()=>{});}

async function loadHistory(){const keys=await slist("audit_");const arr=[];
  for(const k of keys){const a=await sget(k);if(!a)continue;const r=compute(a);arr.push(Object.assign({},a,{_pct:r.pct,_status:r.status,_flags:r.redFlags.length}));}
  arr.sort((a,b)=>new Date(b.date)-new Date(a.date));return arr;}

  const arr=await loadHistory();

  let body=`<div class="card"><span class="cat">Alle revisjoner (${arr.length})</span>`;
  arr.forEach(a=>{body+=`<div class="hist"><div><div class="lab">${esc(a.avdeling||"Uten avdeling")}</div>

/* ---------- OPPFØLGINGSPLAN (løpende på tvers av revisjoner) ---------- */
function parseFrist(s){if(!s)return null;s=String(s);let m=s.match(/^(\d{4})-(\d{2})-(\d{2})/);if(m){const dt=new Date(+m[1],+m[2]-1,+m[3]);return isNaN(dt)?null:dt;}m=s.match(/(\d{1,2})[.\/-](\d{1,2})[.\/-](\d{2,4})/);if(!m)return null;let[_,d,mo,y]=m;y=y.length===2?"20"+y:y;const dt=new Date(+y,+mo-1,+d);return isNaN(dt)?null:dt;}
async function collectOpenDevs(){
  const keys=await slist("audit_");const out=[];
  for(const k of keys){const a=await sget(k);if(!a||!a.devs)continue;
    CP.forEach(p=>{const d=a.devs[p.id];if(!d||!d.active)return;
      const lukket=(d.status||"Åpen")==="Lukket";const verifisert=(d.verifisert||"Ikke verifisert")==="Verifisert";
      if(lukket&&verifisert)return; // ferdig – ut av planen
      out.push({auditId:a.id,avd:a.avdeling||"Uten avdeling",audDate:a.date,p,d,
        status:d.status||"Åpen",verifisert:d.verifisert||"Ikke verifisert",
        fristStr:d.frist||"",frist:parseFrist(d.frist)});});}
  out.sort((x,y)=>{if(x.frist&&y.frist)return x.frist-y.frist;if(x.frist)return -1;if(y.frist)return 1;return 0;});
  return out;}

    <p class="tiny muted" style="margin:6px 0 0">Alle avvik som ikke er både lukket og verifisert, på tvers av revisjoner. Sortert etter frist.</p>
    <div class="kpi" style="margin-top:12px">
      <div class="k"><b>${list.length}</b><span class="small muted">åpne tiltak</span></div>
      <div class="k"><b class="${overdue?'s-RØD':'s-GRØNN'}">${overdue}</b><span class="small muted">over frist</span></div>
    </div></div>`;
  if(!list.length){body+=`<div class="card"><p class="small muted">Ingen åpne tiltak. Alt er lukket og verifisert.</p></div>`;}
  else{body+=`<div class="card"><span class="cat">Tiltak (${list.length})</span>`;
    list.forEach(x=>{const isOver=x.frist&&x.frist<today;
      body+=`<div class="devcard ${x.p.kl[0]}" style="${isOver?'border-left-color:var(--red);background:var(--red-bg)':''}">
        <div class="h"><span>${esc(x.avd)} · ${x.p.id}</span><span class="tiny ${isOver?'s-RØD':'s-GUL'}">${x.fristStr?esc(fmtFrist(x.fristStr)):"uten frist"}${isOver?' · OVER FRIST':''}</span></div>
        <div style="margin:4px 0">${esc(x.p.q)}</div>
        ${x.d.tiltak&&x.d.tiltak.length?`<div class="tiny"><b>Tiltak:</b> ${x.d.tiltak.map(esc).join("; ")}</div>`:''}
        <div class="tiny"><b>Ansvarlig:</b> ${esc(x.d.ansvarlig||"–")} · fra ${fmtDate(x.audDate)}</div>
        <div class="fuctl no-print">
          <select onchange="fuUpdate('${x.auditId}','${x.p.id}','status',this.value)">${["Åpen","Under arbeid","Lukket"].map(o=>`<option ${x.status===o?"selected":""}>${o}</option>`).join("")}</select>
          <select onchange="fuUpdate('${x.auditId}','${x.p.id}','verifisert',this.value)">${["Ikke verifisert","Verifisert"].map(o=>`<option ${x.verifisert===o?"selected":""}>${o}</option>`).join("")}</select>
        </div>
        <div class="fuctl no-print">
          ${AVDELINGSMODUS?`<select onchange="fuUpdate('${x.auditId}','${x.p.id}','lukketAv',this.value)"><option value="">— lukket av (rolle) —</option>${ROLLER.map(r=>`<option ${x.d.lukketAv===r?'selected':''}>${r}</option>`).join('')}</select>`:`<input placeholder="Lukket av" value="${esc(x.d.lukketAv||'')}" onchange="fuUpdate('${x.auditId}','${x.p.id}','lukketAv',this.value)">`}
          <input placeholder="Lukkenotat" value="${esc(x.d.lukketNotat||'')}" onchange="fuUpdate('${x.auditId}','${x.p.id}','lukketNotat',this.value)">
        </div>
        <button class="btn berry sm no-print" style="margin-top:8px" onclick="fuClose('${x.auditId}','${x.p.id}')">Marker lukket + verifisert</button>
      </div>`;});
    body+=`</div><button class="btn ghost sm no-print" onclick="printReport()" style="margin-bottom:14px">Skriv ut / lagre som PDF</button>`;}
  $("#view").innerHTML=body;
}

function fmtDate(iso){try{return new Date(iso).toLocaleDateString("nb-NO",{day:"2-digit",month:"short",year:"numeric"});}catch(e){return iso;}}

/* ---------- v4 hjelpere: lagring, dato, bilder, eksport/import ---------- */
function isoToday(){const d=new Date();return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");}
function isoPlus(n){const d=new Date();d.setDate(d.getDate()+(n||0));return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");}
function fmtFrist(s){if(!s)return"";const dt=parseFrist(s);return dt?dt.toLocaleDateString("nb-NO"):s;}
let _lastToast=0,_tt;
function toast(msg){let el=document.getElementById("toast");if(!el){el=document.createElement("div");el.id="toast";el.className="toast";document.body.appendChild(el);}el.textContent=msg||"Lagret \u2713";el.classList.add("show");clearTimeout(_tt);_tt=setTimeout(()=>el.classList.remove("show"),1400);}
function saveA(){A.updatedAt=Date.now();sset(A.id,A);const now=Date.now();if(now-_lastToast>1200){_lastToast=now;toast();}}
function handlePhoto(id,file){const MAX=1000;const rd=new FileReader();rd.onload=()=>{const img=new Image();img.onload=()=>{let w=img.width,h=img.height;const sc=Math.min(1,MAX/Math.max(w,h));const cw=Math.round(w*sc),ch=Math.round(h*sc);const cv=document.createElement("canvas");cv.width=cw;cv.height=ch;cv.getContext("2d").drawImage(img,0,0,cw,ch);const b64=cv.toDataURL("image/jpeg",0.55);A.devs[id]=A.devs[id]||{tiltak:[],active:true,bilder:[]};A.devs[id].bilder=A.devs[id].bilder||[];if(A.devs[id].bilder.length>=3){toast("Maks 3 bilder");return;}A.devs[id].bilder.push(b64);saveA();renderThumbs(id);};img.src=rd.result;};rd.readAsDataURL(file);}
function renderThumbs(id){const el=document.getElementById("th-"+id);if(!el)return;const d=A.devs[id]||{};el.innerHTML=(d.bilder||[]).map((b,i)=>`<span class="thumbwrap"><img src="${b}" class="thumb"><button type="button" onclick="removePhoto('${id}',${i})">\u00d7</button></span>`).join("");}
function removePhoto(id,i){const d=A.devs[id];if(!d||!d.bilder)return;d.bilder.splice(i,1);saveA();renderThumbs(id);}
function finalizeAudit(){const r=compute(A);if(!r.complete){toast("Fullf\u00f8r alle punkter f\u00f8rst");return;}if(!AVDELINGSMODUS&&!A.revisor){toast("Fyll inn revisor f\u00f8r ferdigstilling");return;}A.finalized=true;A.finalizedAt=new Date().toISOString();A.finalizedBy=A.revisor||"(avdelingsmodus)";saveA();pushAudit(A);toast("Rapport ferdigstilt og l\u00e5st");renderReport();}
async function exportAll(){const keys=await slist("audit_");const audits=[];for(const k of keys){const a=await sget(k);if(a)audits.push(a);}
  const blob=new Blob([JSON.stringify({type:"jbp-revisjon",exportedAt:new Date().toISOString(),audits},null,1)],{type:"application/json"});
  const url=URL.createObjectURL(blob);const el=document.createElement("a");el.href=url;el.download="jbp-revisjon-eksport-"+isoToday()+".json";document.body.appendChild(el);el.click();el.remove();setTimeout(()=>URL.revokeObjectURL(url),2000);toast("Eksportert "+audits.length+" revisjoner");}
function triggerImport(){const inp=document.createElement("input");inp.type="file";inp.accept="application/json,.json";inp.onchange=()=>{if(inp.files&&inp.files[0])doImport(inp.files[0]);};inp.click();}
async function doImport(file){try{const txt=await file.text();const data=JSON.parse(txt);const arr=data.audits||(Array.isArray(data)?data:[]);let n=0;for(const a of arr){if(!a||!a.id)continue;const ex=await sget(a.id);if(!ex||((a.updatedAt||0)>=(ex.updatedAt||0))){await sset(a.id,a);n++;}}toast("Importert/oppdatert "+n+" revisjoner");renderHome();}catch(e){toast("Kunne ikke lese fila");}}
async function fuUpdate(aid,pid,field,val){const a=await sget(aid);if(!a||!a.devs||!a.devs[pid])return;a.devs[pid][field]=val;a.updatedAt=Date.now();await sset(aid,a);closeDeviationApi(aid,pid,{[field]:val});renderFollowup();}
async function fuClose(aid,pid){const a=await sget(aid);if(!a||!a.devs||!a.devs[pid])return;const d=a.devs[pid];d.status="Lukket";d.verifisert="Verifisert";if(!d.verifisertDato)d.verifisertDato=isoToday();a.updatedAt=Date.now();await sset(aid,a);closeDeviationApi(aid,pid,{status:"Lukket",verifisert:"Verifisert",verifisertDato:d.verifisertDato});toast("Tiltak lukket + verifisert");renderFollowup();}

    try{const r=await fetch('/.auth/me');const j=await r.json();JBP.me=(j&&j.clientPrincipal)||null;}catch(e){}

  identityBar();
}
function isAdminUser(){return !!(JBP.me&&JBP.me.userRoles&&JBP.me.userRoles.includes('admin'));}
function withMeta(a){try{const r=compute(a);return Object.assign({},a,{meta:{score:r.pct,status:r.status}});}catch(e){return a;}}
async function pushAudit(a){if(!JBP.backend){return;}try{const res=await fetch('/api/saveLog',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(withMeta(a))});if(!res.ok){queueOutbox(a);}}catch(e){queueOutbox(a);}}
function queueOutbox(a){try{const q=JSON.parse(localStorage.getItem(JBP.OUTBOX)||'{}');q[a.id]=a;localStorage.setItem(JBP.OUTBOX,JSON.stringify(q));}catch(e){}}
async function flushOutbox(){let q={};try{q=JSON.parse(localStorage.getItem(JBP.OUTBOX)||'{}');}catch(e){}for(const id of Object.keys(q)){try{const res=await fetch('/api/saveLog',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(withMeta(q[id]))});if(res.ok)delete q[id];}catch(e){}}try{localStorage.setItem(JBP.OUTBOX,JSON.stringify(q));}catch(e){}}
async function pullMyLogs(){if(!JBP.backend){return;}try{const res=await fetch('/api/myLogs');if(!res.ok)return;const list=await res.json();for(const a of list){if(a&&a.id){const ex=await sget(a.id);if(!ex||((a.updatedAt||0)>=(ex.updatedAt||0)))await sset(a.id,a);}}}catch(e){}}
async function closeDeviationApi(aid,pid,patch){if(!JBP.backend){return;}try{await fetch('/api/closeDeviation',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(Object.assign({auditId:aid,pointId:pid},patch))});}catch(e){}}
function identityBar(){let el=document.getElementById('whoami');if(!JBP.backend){if(el)el.remove();return;}if(!el){el=document.createElement('div');el.id='whoami';el.style.cssText='font-size:.72rem;color:var(--muted);padding:6px 16px;background:#f3eef0;border-bottom:1px solid var(--line);text-align:right';document.body.insertBefore(el,document.body.firstChild);}el.innerHTML=JBP.me?('Innlogget: '+esc(JBP.me.userDetails||'')+(isAdminUser()?' \u00b7 admin':'')+' \u00b7 <a href="/.auth/logout">Logg ut</a>'):'<a href="/.auth/login/aad">Logg inn</a>';}

window.go=go;window.start=start;window.openAudit=openAudit;window.finish=finish;window.showText=showText;window.copyText=copyText;window.printReport=printReport;window.finalizeAudit=finalizeAudit;window.exportAll=exportAll;window.triggerImport=triggerImport;window.fuUpdate=fuUpdate;window.fuClose=fuClose;window.removePhoto=removePhoto;
backendInit();
go("home");
</script>
